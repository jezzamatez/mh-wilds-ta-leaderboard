<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: #e6edf3;
    }

    h1 {
      text-align: center;
      color: #ffb347;
      margin-top: 20px;
    }

    /* TOP SCORE */
    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0;
    }

    .score {
      background: #151b28;
      padding: 12px 20px;
      border-radius: 10px;
      text-align: center;
      min-width: 80px;
    }

    .score span {
      display: block;
      font-size: 22px;
      font-weight: bold;
    }

    /* TABS */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    .tab {
      flex: 1;
      max-width: 400px;
      padding: 12px;
      text-align: center;
      background: #151b28;
      border-radius: 8px;
      cursor: pointer;
    }

    .tab.active {
      color: #ffb347;
      font-weight: bold;
    }

    /* TABLE */
    table {
      width: 90%;
      margin: auto;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      border-bottom: 1px solid #2a3242;
      color: #9fb3c8;
    }

    tr {
      border-bottom: 1px solid #1c2333;
    }

    /* FLEX ALIGNMENT */
    .cell-flex {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ICONS */
    .icon {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }

    .icon.weapon {
      width: 22px;
      height: 22px;
      opacity: 0.9;
    }

    /* PLAYER STYLING */
    .player {
      font-weight: 600;
    }

    .player.jeremy {
      color: #4ea1ff;
    }

    .player.matt {
      color: #ffb347;
    }

    /* ROW HIGHLIGHT */
    tr.row-jeremy {
      border-left: 3px solid #4ea1ff;
    }

    tr.row-matt {
      border-left: 3px solid #ffb347;
    }

    /* TIME */
    .time {
      font-family: monospace;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #lastUpdated {
      text-align: center;
      margin: 20px;
      color: #7f8ca3;
    }
  </style>
</head>

<body>

<h1>TA Leaderboard</h1>

<div class="scoreboard">
  <div class="score">
    <span id="jeremyCount">0</span>
    Jeremy
  </div>
  <div class="score">
    <span id="mattCount">0</span>
    Matt
  </div>
</div>

<div class="tabs">
  <div class="tab active">Leaderboard</div>
  <div class="tab">Weapon Times</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<script>
// --- CONFIG ---
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

let allRuns = [];
let bestRuns = [];

let monsterIcons = {};
let weaponIcons = {};

// --- CSV PARSER ---
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      if (inQuotes && text[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) {
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      }
    } else {
      current += char;
    }
  }

  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }

  return rows;
}

// --- TIME ---
function parseTime(val) {
  if (!val) return null;

  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf')) return null;

  const m = s.match(/^(\d+):(\d+)/);
  if (!m) return null;

  const minutes = parseInt(m[1]);
  const seconds = parseInt(m[2]);

  if (minutes >= 59) return null;

  return minutes * 60 + seconds;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// --- LOAD DATA ---
async function loadData() {
  const status = document.getElementById('lastUpdated');
  status.textContent = "Syncing...";

  try {
    const [runsRes, monsterRes, weaponRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes);
    const monsterRows = parseCSV(monsterRes);
    const weaponRows = parseCSV(weaponRes);

    // MONSTER ICONS
    const mHeaders = monsterRows[0].map(h => h.toLowerCase());
    const mNameCol = mHeaders.indexOf('monster');
    const mIconCol = mHeaders.indexOf('icon');

    monsterRows.slice(1).forEach(r => {
      if (r[mNameCol] && r[mIconCol]) {
        monsterIcons[r[mNameCol].trim().toLowerCase()] = r[mIconCol];
      }
    });

    // WEAPON ICONS
    const wHeaders = weaponRows[0].map(h => h.toLowerCase());
    const wNameCol = wHeaders.indexOf('weapon') !== -1 ? wHeaders.indexOf('weapon') : 0;
    const wIconCol = wHeaders.indexOf('icon');

    weaponRows.slice(1).forEach(r => {
      if (r[wNameCol] && r[wIconCol]) {
        weaponIcons[r[wNameCol].trim().toLowerCase()] = r[wIconCol];
      }
    });

    // RUN DATA
    const headers = runRows[0].map(h => h.toLowerCase());
    const col = name => headers.indexOf(name);

    const colPlayer = col('player');
    const colMonster = col('monster');
    const colVariant = col('variant');
    const colTime = col('time') !== -1 ? col('time') : col('best time');
    const colWeapon = col('weapon');

    allRuns = [];

    runRows.slice(1).forEach(r => {
      if (!r[colPlayer]) return;

      const time = parseTime(r[colTime]);
      if (time === null) return;

      allRuns.push({
        player: r[colPlayer],
        monster: r[colMonster],
        variant: r[colVariant] || 'Base',
        weapon: r[colWeapon] || '',
        bestTime: time
      });
    });

    buildBestRuns();
    renderLeaderboard();

    status.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    console.error(e);
    document.getElementById('mainContent').innerHTML = "Failed to load data";
    status.textContent = "Sync failed";
  }
}

// --- BEST RUNS ---
function buildBestRuns() {
  const map = {};

  allRuns.forEach(run => {
    const key = `${run.variant}-${run.monster}`.toLowerCase();

    if (!map[key] || run.bestTime < map[key].bestTime) {
      map[key] = run;
    }
  });

  bestRuns = Object.values(map).sort((a, b) => a.bestTime - b.bestTime);
}

// --- RENDER ---
function renderLeaderboard() {
  let jeremyWins = 0;
  let mattWins = 0;

  bestRuns.forEach(r => {
    if (r.player.toLowerCase().includes('jeremy')) jeremyWins++;
    if (r.player.toLowerCase().includes('matt')) mattWins++;
  });

  document.getElementById('jeremyCount').textContent = jeremyWins;
  document.getElementById('mattCount').textContent = mattWins;

  let html = `<table><thead><tr>
    <th>#</th><th>Monster</th><th>Player</th><th>Weapon</th><th>Time</th>
  </tr></thead><tbody>`;

  bestRuns.forEach((r, i) => {
    const mIcon = monsterIcons[r.monster?.trim().toLowerCase()];
    const wIcon = weaponIcons[r.weapon?.trim().toLowerCase()];

    const playerClass = r.player.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';

    html += `
      <tr class="row-${playerClass}">
        <td>${i + 1}</td>
        <td><div class="cell-flex">
          ${mIcon ? `<img src="${mIcon}" class="icon">` : ''}
          ${r.monster}
        </div></td>
        <td class="player ${playerClass}">${r.player}</td>
        <td><div class="cell-flex">
          ${wIcon ? `<img src="${wIcon}" class="icon weapon">` : ''}
          ${r.weapon}
        </div></td>
        <td class="time">${formatTime(r.bestTime)}</td>
      </tr>
    `;
  });

  html += '</tbody></table>';

  document.getElementById('mainContent').innerHTML = html;
}

// INIT
loadData();
setInterval(loadData, 120000);
</script>

</body>
</html>
