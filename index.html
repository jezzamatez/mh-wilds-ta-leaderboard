<script>
// --- CONFIGURATION ---
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

const DNF_TIME = 59 * 60;

let allRuns = [];
let filters = { variant: 'all', player: 'all' };
let currentTab = 'leaderboard';

// --- CSV PARSER (handles quoted commas) ---
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      if (inQuotes && text[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) {
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      }
    } else {
      current += char;
    }
  }

  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }

  return rows;
}

// --- UTILITIES (unchanged) ---
function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf') || s === '') return null;

  const m = s.match(/^(\d+):(\d+)(\.\d+)?$/);
  if (!m) return null;
  return (parseInt(m[1]) * 60) + parseInt(m[2]) + (m[3] ? parseFloat(m[3]) : 0);
}

function formatTime(secs) {
  if (secs === null || isNaN(secs) || secs >= DNF_TIME) return 'DNF';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function pairHunts(runs) {
  const paired = {};
  runs.forEach(run => {
    const key = `${run.variant}-${run.monsterName}`.toLowerCase().replace(/\s/g, '');
    if (!paired[key]) {
      paired[key] = { 
        monsterName: run.monsterName, 
        icon: run.monsterIcon, 
        variant: run.variant 
      };
    }
    const p = run.player.toLowerCase();
    if (p.includes('jeremy')) paired[key].jeremy = run;
    if (p.includes('matt')) paired[key].matt = run;
  });
  return Object.values(paired);
}

// --- DATA LOADING (UPDATED) ---
async function loadData() {
  const content = document.getElementById('mainContent');
  document.getElementById('lastUpdated').textContent = 'Syncing...';

  try {
    const ts = Date.now();

    const [runsRes, monsterRes, weaponRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes);
    const monsterRows = parseCSV(monsterRes);
    const weaponRows = parseCSV(weaponRes);

    const monsterMap = {};
    monsterRows.slice(1).forEach(r => {
      if (r[0] && r[1]) monsterMap[r[0]] = r[1];
    });

    const weaponMap = {};
    weaponRows.slice(1).forEach(r => {
      if (r[0] && r[1]) weaponMap[r[0]] = r[1];
    });

    allRuns = [];

    runRows.slice(1).forEach(row => {
      if (!row[3]) return;

      const mName = row[1] || 'Unknown';
      const wName = row[4] || 'Unknown';

      allRuns.push({
        variant: row[0] || 'Base',
        monsterName: mName,
        monsterIcon: monsterMap[mName] || '👾',
        player: row[3],
        weaponName: wName,
        weaponIcon: weaponMap[wName] || '⚔️',
        bestTime: parseTime(row[8])
      });
    });

    window._hunts = pairHunts(allRuns);
    updateStats();
    renderTab();

    document.getElementById('lastUpdated').textContent =
      `Live Sync: ${new Date().toLocaleTimeString()}`;

  } catch(e) {
    console.error("Critical Load Error:", e);
    content.innerHTML = `<div class="error"><b>Sync Error:</b> ${e.message}</div>`;
  }
}

// --- REST OF YOUR RENDERING CODE (UNCHANGED) ---

loadData();
setInterval(loadData, 120000);
</script>
