<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Wilds — Time Attack Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8a020;
    --accent2: #c06010;
    --jeremy: #3b82f6;
    --matt: #10b981;
    --text: #f0ede8;
    --muted: #7a8090;
    --danger: #e05050;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a1200 50%, #0d0f14 100%);
    border-bottom: 1px solid var(--border2);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); opacity: 0.5; font-weight: 400; }
  .last-updated {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-left: 12px;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LAYOUT */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* PLAYER BADGES */
  .players {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }
  .player-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    flex: 1;
    max-width: 280px;
  }
  .player-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .player-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .player-stat {
    margin-left: auto;
    text-align: right;
  }
  .player-stat .num { font-size: 20px; font-weight: 500; font-family: 'Rajdhani', sans-serif; }
  .player-stat .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .divider { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* LEADERBOARD TABLE */
  .board-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 16px;
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th.num { text-align: right; }
  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rank {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    width: 32px;
    text-align: center;
    color: var(--muted);
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }

  .monster-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .variant-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
  .vt-tempered { background: rgba(232,160,32,0.15); color: var(--accent); border: 1px solid rgba(232,160,32,0.3); }
  .vt-frenzied { background: rgba(224,80,80,0.15); color: var(--danger); border: 1px solid rgba(224,80,80,0.3); }
  .vt-alpha { background: rgba(59,130,246,0.15); color: var(--jeremy); border: 1px solid rgba(59,130,246,0.3); }
  .vt-base { background: rgba(122,128,144,0.15); color: var(--muted); border: 1px solid rgba(122,128,144,0.3); }

  .time {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .time.dnf { color: var(--muted); font-size: 13px; font-weight: 400; letter-spacing: 0; }
  .time.best { color: var(--accent); }

  .player-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 12px;
  }
  .pp-jeremy { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .pp-matt { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .pp-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pp-jeremy .pp-dot { background: var(--jeremy); }
  .pp-matt .pp-dot { background: var(--matt); }

  .diff {
    font-size: 12px;
    font-family: 'Rajdhani', sans-serif;
  }
  .diff.faster { color: var(--matt); }
  .diff.slower { color: var(--danger); }
  .diff.tied { color: var(--muted); }

  /* HEAD TO HEAD */
  .h2h-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .h2h-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .h2h-wins {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .h2h-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  /* MONSTER DETAILS VIEW */
  .monster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .monster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .monster-card:hover { border-color: var(--border2); }
  .mc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .mc-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .mc-tier {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .mc-times {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .mc-player { display: flex; align-items: center; gap: 7px; }
  .mc-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--danger); text-align: center; padding: 40px; }

  /* STAR TIER */
  .star { color: var(--accent); font-size: 11px; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .h2h-grid { grid-template-columns: 1fr 1fr; }
    .players { flex-direction: column; }
    .player-badge { max-width: 100%; }
    td, th { padding: 8px 10px; }
    .filters { gap: 6px; }
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .count-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 9px;
    border-radius: 10px;
  }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">MH Wilds <span>/ Time Attack</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="last-updated" id="lastUpdated">Loading...</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
</header>

<main>
  <!-- Player Summary -->
  <div class="players" id="playerSummary">
    <div class="player-badge">
      <div class="player-dot" style="background:var(--jeremy)"></div>
      <div class="player-name" style="color:var(--jeremy)">Jeremy</div>
      <div class="player-stat">
        <div class="num" id="jeremyCount">—</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
    <div class="player-badge">
      <div class="player-dot" style="background:var(--matt)"></div>
      <div class="player-name" style="color:var(--matt)">Matt</div>
      <div class="player-stat">
        <div class="num" id="mattCount">—</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
  </div>

  <!-- View Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('leaderboard', this)">Best Times</div>
    <div class="tab" onclick="switchTab('h2h', this)">Head to Head</div>
    <div class="tab" onclick="switchTab('monsters', this)">By Monster</div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span class="filter-label">Variant</span>
    <button class="filter-btn active" onclick="setFilter('variant','all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('variant','Tempered',this)">Tempered</button>
    <button class="filter-btn" onclick="setFilter('variant','Frenzied',this)">Frenzied</button>
    <button class="filter-btn" onclick="setFilter('variant','Alpha',this)">Alpha</button>
    <button class="filter-btn" onclick="setFilter('variant','Base',this)">Base</button>
    <div class="divider"></div>
    <span class="filter-label">Player</span>
    <button class="filter-btn active" onclick="setFilter('player','all',this)">Both</button>
    <button class="filter-btn" onclick="setFilter('player','Jeremy',this)">Jeremy</button>
    <button class="filter-btn" onclick="setFilter('player','Matt',this)">Matt</button>
  </div>

  <!-- Main content area -->
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div>Loading leaderboard data...</div>
  </div>
</main>

<script>
// Your direct published CSV link
const PUBLISHED_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR8i7-4hmloDOdy0JKUAGCJdwGwlsToeFPTucntnVRQ5v4D15LP8sPoAsCidu2LaABWxIw3qHwTjSrF/pub?gid=0&single=true&output=csv';
const DNF_TIME = 59 * 60;

let allRuns = [];
let filters = { variant: 'all', player: 'all' };
let currentTab = 'leaderboard';

// Using a high-availability proxy to ensure cross-origin data loads correctly
async function fetchCSV() {
  const proxyUrl = 'https://api.allorigins.win/raw?url=';
  const res = await fetch(proxyUrl + encodeURIComponent(PUBLISHED_CSV_URL));
  
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.replace(/\r/g,'')).filter(l => l.trim() !== '');
  return lines.map(l => {
    const cells = [];
    let cur = '', inQ = false;
    for (let c of l) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
      else cur += c;
    }
    cells.push(cur);
    return cells;
  });
}

function parseTime(str) {
  if (!str || str.trim() === '' || str.toLowerCase().includes('dnf')) return null;
  str = str.trim();
  const m = str.match(/^(\d+):(\d+)\.(\d+)$/);
  if (!m) return null;
  const secs = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3]) / 100;
  return secs >= DNF_TIME ? null : secs;
}

function formatTime(secs) {
  if (secs === null) return 'DNF';
  const m = Math.floor(secs / 60);
  const s = (secs - m * 60).toFixed(2);
  return `${m}:${s.toString().padStart(5, '0')}`;
}

function stars(tier) {
  const n = parseInt(tier);
  return isNaN(n) ? tier : '★'.repeat(n);
}

async function loadData() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading leaderboard data...</div>';
  document.getElementById('lastUpdated').textContent = 'Loading...';

  try {
    const raw = await fetchCSV();
    const rows = parseCSV(raw);

    // Locate the header row (usually contains 'Variant' and 'Player')
    let headerIdx = rows.findIndex(r => r.some(c => c.trim().toLowerCase() === 'variant'));
    if (headerIdx === -1) throw new Error('Data format incorrect: Could not find header row.');

    const header = rows[headerIdx];
    const playerCol = header.findIndex(c => c.trim().toLowerCase() === 'player');
    const totalCol = header.findIndex(c => c.trim().toLowerCase() === 'grand total');

    allRuns = [];
    let curVariant = '', curTier = '';

    // Parse data rows starting after the header
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[playerCol] || r[playerCol].trim() === '') continue;

      if (r[0] && r[0].trim() !== '') curVariant = r[0].trim();
      if (r[1] && r[1].trim() !== '') curTier = r[1].trim();

      allRuns.push({
        variant: curVariant || 'Base',
        tier: curTier,
        player: r[playerCol].trim(),
        bestTime: parseTime(r[totalCol]),
        rowIdx: i
      });
    }

    // Pair Jeremy and Matt by their row order
    window._hunts = [];
    for (let i = 0; i < allRuns.length; i += 2) {
      const p1 = allRuns[i];
      const p2 = allRuns[i+1];
      const jeremy = p1.player === 'Jeremy' ? p1 : (p2 && p2.player === 'Jeremy' ? p2 : null);
      const matt = p1.player === 'Matt' ? p1 : (p2 && p2.player === 'Matt' ? p2 : null);
      
      const variant = (jeremy || matt).variant;
      const tier = (jeremy || matt).tier;
      
      window._hunts.push({
        id: i / 2,
        monsterName: `${variant} ${tier} #${(i/2) + 1}`,
        variant,
        tier,
        jeremy,
        matt
      });
    }

    updateStats();
    renderTab();
    document.getElementById('lastUpdated').textContent = `Updated ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
  } catch(e) {
    console.error(e);
    content.innerHTML = `<div class="error">Failed to load data.<br><small>${e.message}</small></div>`;
  }
}

// ... Keep your existing UI functions (switchTab, renderTab, etc.) below this ...
</script>
</body>
</html>
