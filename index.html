<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: #e6edf3;
    }

    h1 {
      text-align: center;
      color: #ffb347;
      margin-top: 20px;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0;
	  max-width: 900px;
    }

    .score {
      background: #151b28;
      padding: 12px 20px;
      border-radius: 10px;
      text-align: center;
      min-width: 80px;
	  flex: 1;
	  max-width: 200px;
    }

    .score span {
      display: block;
      font-size: 22px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
	  max-width: 900px;
    }

    .tab {
      flex: 1;
      max-width: 400px;
      padding: 12px;
      text-align: center;
      background: #151b28;
      border-radius: 8px;
    }

    .tab.active {
      color: #ffb347;
      font-weight: bold;
    }

    table {
      width: 95%;
	  max-width: 900px;
      margin: auto;
      border-collapse: collapse;
      table-layout: fixed; /* Ensures specific column widths */
    }

    th, td {
      padding: 8px 10px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Column Width Configuration */
    th:nth-child(1), td:nth-child(1) { width: 220px; }  /* Monster */
    th:nth-child(2), td:nth-child(2) { width: 100px; } /* Player */
    th:nth-child(3), td:nth-child(3) { width: 160px; } /* Weapon */
    th:nth-child(4), td:nth-child(4) { width: 100px; text-align: right; } /* Time */

    th {
      border-bottom: 1px solid #2a3242;
      color: #9fb3c8;
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    tr {
      border-bottom: 1px solid #1c2333;
    }

    .tier-row td {
      padding-top: 20px;
      font-weight: bold;
      color: #ffb347;
      border-bottom: 1px solid #2a3242;
      background: rgba(255, 179, 71, 0.05);
    }

    .cell-flex {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .icon.weapon {
      width: 20px;
      height: 20px;
      opacity: 0.9;
    }

    .player {
      font-weight: 600;
    }

    .player.jeremy {
      color: #4ea1ff;
    }

    .player.matt {
      color: #ffb347;
    }

    tr.row-jeremy {
      border-left: 3px solid #4ea1ff;
    }

    tr.row-matt {
      border-left: 3px solid #ffb347;
    }

    .time {
      font-family: monospace;
      font-weight: 600;
      color: #ffb347;
    }

    #lastUpdated {
      text-align: center;
      margin: 20px;
      color: #7f8ca3;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>

<h1>TA Leaderboard</h1>

<div class="scoreboard">
  <div class="score">
    <span id="jeremyCount">0</span>
    Jeremy
  </div>
  <div class="score">
    <span id="mattCount">0</span>
    Matt
  </div>
</div>

<div class="tabs">
  <div class="tab active">Leaderboard</div>
  <div class="tab">Weapon Times</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<script>
// --- CONFIG ---
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

let allRuns = [];
let bestRuns = [];

let monsterIcons = {};
let monsterTiers = {};
let weaponIcons = {};

// --- CSV PARSER ---
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (char === '"') {
      if (inQuotes && text[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) {
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      }
    } else {
      current += char;
    }
  }
  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }
  return rows;
}

// --- TIME ---
function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf')) return null;

  // Supports mm:ss and mm:ss.ms
  const m = s.match(/^(\d+):(\d+)(\.\d+)?/);
  if (!m) return null;

  const minutes = parseInt(m[1]);
  const seconds = parseInt(m[2]);
  const ms = m[3] ? parseFloat(m[3]) : 0;

  if (minutes >= 59) return null;
  return (minutes * 60) + seconds + ms;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  const ms = (secs % 1).toFixed(2).substring(1); 
  
  // Appends .xx only if there is a fractional value
  return `${m}:${s.toString().padStart(2, '0')}${ms === '.00' ? '' : ms}`;
}

// --- LOAD DATA ---
async function loadData() {
  const status = document.getElementById('lastUpdated');
  status.textContent = "Syncing...";

  try {
    const ts = Date.now(); // Cache-buster
    const [runsRes, monsterRes, weaponRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes);
    const monsterRows = parseCSV(monsterRes);
    const weaponRows = parseCSV(weaponRes);

    monsterIcons = {};
    monsterTiers = {};
    monsterRows.slice(1).forEach(r => {
      const tier = r[0];
      const name = r[1];
      const icon = r[3];
      if (name) {
        const key = name.trim().toLowerCase();
        monsterIcons[key] = icon;
        monsterTiers[key] = tier;
      }
    });

    weaponIcons = {};
    weaponRows.slice(1).forEach(r => {
      if (r[0] && r[2]) {
        weaponIcons[r[0].trim().toLowerCase()] = r[2];
      }
    });

    const headers = runRows[0].map(h => h.toLowerCase());
    const col = name => headers.indexOf(name);
    const colPlayer = col('player');
    const colMonster = col('monster');
    const colVariant = col('variant');
    const colTime = col('time') !== -1 ? col('time') : col('best time');
    const colWeapon = col('weapon');

    allRuns = [];
    runRows.slice(1).forEach(r => {
      if (!r[colPlayer]) return;
      const time = parseTime(r[colTime]);
      if (time === null) return;

      allRuns.push({
        player: r[colPlayer],
        monster: r[colMonster],
        variant: r[colVariant] || 'Base',
        weapon: r[colWeapon] || '',
        bestTime: time
      });
    });

    buildBestRuns();
    renderLeaderboard();
    status.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    console.error(e);
    document.getElementById('mainContent').innerHTML = "Failed to load data";
    status.textContent = "Sync failed";
  }
}

function buildBestRuns() {
  const map = {};
  allRuns.forEach(run => {
    const key = `${run.variant}-${run.monster}`.toLowerCase();
    if (!map[key] || run.bestTime < map[key].bestTime) {
      map[key] = run;
    }
  });
  bestRuns = Object.values(map).sort((a, b) => a.bestTime - b.bestTime);
}

function renderLeaderboard() {
  let jWins = 0, mWins = 0;
  bestRuns.forEach(r => {
    if (r.player.toLowerCase().includes('jeremy')) jWins++;
    if (r.player.toLowerCase().includes('matt')) mWins++;
  });

  document.getElementById('jeremyCount').textContent = jWins;
  document.getElementById('mattCount').textContent = mWins;

  const grouped = {};
  bestRuns.forEach(r => {
    const key = r.monster.trim().toLowerCase();
    const tier = monsterTiers[key] || 'Unknown';
    if (!grouped[tier]) grouped[tier] = [];
    grouped[tier].push(r);
  });

  const sortedTiers = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

  let html = `<table><thead><tr>
    <th>Monster</th><th>Player</th><th>Weapon</th><th style="text-align:right">Time</th>
  </tr></thead><tbody>`;

  sortedTiers.forEach(tier => {
    html += `<tr class="tier-row"><td colspan="4">${tier}</td></tr>`;
    grouped[tier].forEach(r => {
      const mIcon = monsterIcons[r.monster.trim().toLowerCase()];
      const wIcon = weaponIcons[r.weapon.trim().toLowerCase()];
      const playerClass = r.player.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';

      html += `
        <tr class="row-${playerClass}">
          <td><div class="cell-flex">
            ${mIcon ? `<img src="${mIcon}" class="icon">` : ''}
            ${r.monster}
          </div></td>
          <td class="player ${playerClass}">${r.player}</td>
          <td><div class="cell-flex">
            ${wIcon ? `<img src="${wIcon}" class="icon weapon">` : ''}
            ${r.weapon}
          </div></td>
          <td class="time" style="text-align:right">${formatTime(r.bestTime)}</td>
        </tr>
      `;
    });
  });

  html += '</tbody></table>';
  document.getElementById('mainContent').innerHTML = html;
}

// INIT
loadData();
setInterval(loadData, 120000);
</script>

</body>
</html>
