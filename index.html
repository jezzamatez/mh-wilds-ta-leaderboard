<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Wilds — Time Attack Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8a020;
    --accent2: #c06010;
    --jeremy: #3b82f6;
    --matt: #10b981;
    --text: #f0ede8;
    --muted: #7a8090;
    --danger: #e05050;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a1200 50%, #0d0f14 100%);
    border-bottom: 1px solid var(--border2);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); opacity: 0.5; font-weight: 400; }
  .last-updated {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-left: 12px;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LAYOUT */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* PLAYER BADGES */
  .players {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }
  .player-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    flex: 1;
    max-width: 280px;
  }
  .player-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .player-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .player-stat {
    margin-left: auto;
    text-align: right;
  }
  .player-stat .num { font-size: 20px; font-weight: 500; font-family: 'Rajdhani', sans-serif; }
  .player-stat .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .divider { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* LEADERBOARD TABLE */
  .board-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 16px;
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th.num { text-align: right; }
  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rank {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    width: 32px;
    text-align: center;
    color: var(--muted);
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }

  .monster-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .variant-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
  .vt-tempered { background: rgba(232,160,32,0.15); color: var(--accent); border: 1px solid rgba(232,160,32,0.3); }
  .vt-frenzied { background: rgba(224,80,80,0.15); color: var(--danger); border: 1px solid rgba(224,80,80,0.3); }
  .vt-alpha { background: rgba(59,130,246,0.15); color: var(--jeremy); border: 1px solid rgba(59,130,246,0.3); }
  .vt-base { background: rgba(122,128,144,0.15); color: var(--muted); border: 1px solid rgba(122,128,144,0.3); }

  .time {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .time.dnf { color: var(--muted); font-size: 13px; font-weight: 400; letter-spacing: 0; }
  .time.best { color: var(--accent); }

  .player-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 12px;
  }
  .pp-jeremy { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .pp-matt { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .pp-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pp-jeremy .pp-dot { background: var(--jeremy); }
  .pp-matt .pp-dot { background: var(--matt); }

  .diff {
    font-size: 12px;
    font-family: 'Rajdhani', sans-serif;
  }
  .diff.faster { color: var(--matt); }
  .diff.slower { color: var(--danger); }
  .diff.tied { color: var(--muted); }

  /* HEAD TO HEAD */
  .h2h-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .h2h-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .h2h-wins {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .h2h-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  /* MONSTER DETAILS VIEW */
  .monster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .monster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .monster-card:hover { border-color: var(--border2); }
  .mc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .mc-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .mc-tier {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .mc-times {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .mc-player { display: flex; align-items: center; gap: 7px; }
  .mc-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--danger); text-align: center; padding: 40px; }

  /* STAR TIER */
  .star { color: var(--accent); font-size: 11px; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .h2h-grid { grid-template-columns: 1fr 1fr; }
    .players { flex-direction: column; }
    .player-badge { max-width: 100%; }
    td, th { padding: 8px 10px; }
    .filters { gap: 6px; }
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .count-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 9px;
    border-radius: 10px;
  }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">MH Wilds <span>/ Time Attack</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="last-updated" id="lastUpdated">Loading...</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
</header>

<main>
  <!-- Player Summary -->
  <div class="players" id="playerSummary">
    <div class="player-badge">
      <div class="player-dot" style="background:var(--jeremy)"></div>
      <div class="player-name" style="color:var(--jeremy)">Jeremy</div>
      <div class="player-stat">
        <div class="num" id="jeremyCount">—</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
    <div class="player-badge">
      <div class="player-dot" style="background:var(--matt)"></div>
      <div class="player-name" style="color:var(--matt)">Matt</div>
      <div class="player-stat">
        <div class="num" id="mattCount">—</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
  </div>

  <!-- View Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('leaderboard', this)">Best Times</div>
    <div class="tab" onclick="switchTab('h2h', this)">Head to Head</div>
    <div class="tab" onclick="switchTab('monsters', this)">By Monster</div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span class="filter-label">Variant</span>
    <button class="filter-btn active" onclick="setFilter('variant','all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('variant','Tempered',this)">Tempered</button>
    <button class="filter-btn" onclick="setFilter('variant','Frenzied',this)">Frenzied</button>
    <button class="filter-btn" onclick="setFilter('variant','Alpha',this)">Alpha</button>
    <button class="filter-btn" onclick="setFilter('variant','Base',this)">Base</button>
    <div class="divider"></div>
    <span class="filter-label">Player</span>
    <button class="filter-btn active" onclick="setFilter('player','all',this)">Both</button>
    <button class="filter-btn" onclick="setFilter('player','Jeremy',this)">Jeremy</button>
    <button class="filter-btn" onclick="setFilter('player','Matt',this)">Matt</button>
  </div>

  <!-- Main content area -->
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div>Loading leaderboard data...</div>
  </div>
</main>

<script>
const PUBLISHED_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR8i7-4hmloDOdy0JKUAGCJdwGwlsToeFPTucntnVRQ5v4D15LP8sPoAsCidu2LaABWxIw3qHwTjSrF/pub?gid=0&single=true&output=csv';
const DNF_TIME = 59 * 60;

let allRuns = [];
let filters = { variant: 'all', player: 'all' };
let currentTab = 'leaderboard';

// Using a proxy to bypass browser security blocks (CORS)
async function fetchCSV() {
  const proxyUrl = 'https://corsproxy.io/?';
  const targetUrl = encodeURIComponent(PUBLISHED_CSV_URL);
  const res = await fetch(proxyUrl + targetUrl);
  
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.replace(/\r/g,''));
  return lines.map(l => {
    const cells = [];
    let cur = '', inQ = false;
    for (let c of l) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
      else cur += c;
    }
    cells.push(cur);
    return cells;
  });
}

function parseTime(str) {
  if (!str || str.trim() === '') return null;
  str = str.trim();
  const m = str.match(/^(\d+):(\d+)\.(\d+)$/);
  if (!m) return null;
  const secs = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3]) / 100;
  if (secs >= DNF_TIME) return null;
  return secs;
}

function formatTime(secs) {
  if (secs === null) return null;
  const m = Math.floor(secs / 60);
  const s = secs - m * 60;
  return `${m}:${s.toFixed(2).padStart(5,'0')}`;
}

function stars(tier) {
  const n = parseInt(tier);
  if (isNaN(n)) return tier;
  return '★'.repeat(n);
}

async function loadData() {
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Loading leaderboard data...</div>';
  document.getElementById('lastUpdated').textContent = 'Loading...';

  try {
    const raw = await fetchCSV();
    const rows = parseCSV(raw);

    // Parse structure: find header rows
    // Row 4 (index ~3): Variant | Tier | M_Icon | | Player | [weapons...] | | | | | | | | Grand Total
    // Row 5+: data rows

    let headerRow = null;
    let dataStartIdx = -1;

    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      if (r[0] && r[0].trim().toLowerCase() === 'variant') {
        headerRow = r;
        dataStartIdx = i + 1;
        break;
      }
    }

    if (!headerRow) throw new Error('Could not find header row');

    // Find weapon columns (columns between Player and Grand Total)
    const playerCol = headerRow.findIndex(c => c.trim().toLowerCase() === 'player');
    const totalCol = headerRow.findIndex(c => c.trim().toLowerCase() === 'grand total');

    allRuns = [];
    let curVariant = '', curTier = '';

    for (let i = dataStartIdx; i < rows.length; i++) {
      const r = rows[i];
      if (!r || r.every(c => !c.trim())) continue;

      const rawVariant = r[0] ? r[0].trim() : '';
      const rawTier = r[1] ? r[1].trim() : '';
      const player = r[playerCol] ? r[playerCol].trim() : '';

      if (rawVariant) curVariant = rawVariant;
      if (rawTier) curTier = rawTier;

      if (!player) continue;

      // Find the best time in weapon columns
      // Also grab weapon times per column
      const weaponTimes = [];
      if (totalCol > 0) {
        for (let c = playerCol + 1; c < totalCol; c++) {
          const t = parseTime(r[c]);
          if (t !== null) weaponTimes.push({ weaponIdx: c - playerCol - 1, time: t });
        }
      }

      const grandTotal = totalCol > 0 ? r[totalCol] : '';
      const bestTime = parseTime(grandTotal);

      allRuns.push({
        variant: curVariant || 'Base',
        tier: curTier,
        player,
        bestTime,
        weaponTimes,
        rowIdx: i,
      });
    }

    // Try to extract monster names from MonsterInfo sheet
    // For now, group by variant+tier as monster identifier
    // Since we can't get monster names easily, create readable labels
    // Group consecutive rows with same variant+tier into monster groups
    const groups = [];
    let g = null;
    let monsterCount = {};
    allRuns.forEach(run => {
      const key = run.variant + '|' + run.tier;
      if (!g || g.key !== key) {
        g = { key, variant: run.variant, tier: run.tier, runs: [] };
        groups.push(g);
      }
      g.runs.push(run);
    });

    // Assign monster indices within each variant+tier
    const variantTierIdx = {};
    allRuns.forEach(run => {
      const key = run.variant + '|' + run.tier;
      // Each pair of Jeremy/Matt rows is one "hunt"
    });

    // Pair up Jeremy/Matt for same variant/tier/hunt
    const hunts = [];
    let huntMap = {};
    let pairBuffer = {};
    allRuns.forEach((run, i) => {
      const key = run.variant + '|' + run.tier + '|' + run.rowIdx;
      // Find partner: adjacent rows with same variant+tier
    });

    // Simpler: just use rows as-is, group by pairs
    const pairedHunts = [];
    for (let i = 0; i < allRuns.length; i += 2) {
      const a = allRuns[i];
      const b = allRuns[i+1];
      if (!b) { pairedHunts.push({ jeremy: null, matt: null, ...( a.player === 'Jeremy' ? { jeremy: a } : { matt: a }) }); continue; }
      const jeremy = a.player === 'Jeremy' ? a : b;
      const matt = a.player === 'Matt' ? a : b;
      pairedHunts.push({ jeremy, matt, variant: jeremy.variant, tier: jeremy.tier });
    }

    // Assign human-readable monster names per variant+tier group
    const monsterNames = buildMonsterNames(pairedHunts);
    pairedHunts.forEach((h, i) => { h.monsterName = monsterNames[i]; h.id = i; });
    allRuns.forEach((r, i) => { r.huntId = Math.floor(i/2); });

    window._hunts = pairedHunts;
    updateStats();
    renderTab();

    const now = new Date();
    document.getElementById('lastUpdated').textContent = `Updated ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    console.error(e);
    document.getElementById('mainContent').innerHTML = `<div class="error">Failed to load data.<br><small>${e.message}</small><br><br>Make sure the sheet is shared publicly (Anyone with link → Viewer).</div>`;
    document.getElementById('lastUpdated').textContent = 'Error';
  }
}

function buildMonsterNames(hunts) {
  // We don't have monster names from the sheet yet, so use numbered format
  // grouped by variant+tier
  const variantTierCounts = {};
  return hunts.map(h => {
    const vt = h.variant + '|' + h.tier;
    variantTierCounts[vt] = (variantTierCounts[vt] || 0) + 1;
    return `${h.variant} ${h.tier} #${variantTierCounts[vt]}`;
  });
}

function updateStats() {
  const hunts = window._hunts || [];
  const jCount = hunts.filter(h => h.jeremy && h.jeremy.bestTime !== null).length;
  const mCount = hunts.filter(h => h.matt && h.matt.bestTime !== null).length;
  document.getElementById('jeremyCount').textContent = jCount;
  document.getElementById('mattCount').textContent = mCount;
}

function getFilteredHunts() {
  let hunts = window._hunts || [];
  if (filters.variant !== 'all') hunts = hunts.filter(h => h.variant === filters.variant);
  return hunts;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  renderTab();
}

function setFilter(type, val, el) {
  const group = el.parentElement.querySelectorAll('.filter-btn');
  // Find siblings in same filter group
  const allBtns = document.querySelectorAll('.filter-btn');
  // Determine group by filter-label before this button
  let inGroup = false;
  let currentLabel = '';
  document.querySelectorAll('.filters > *').forEach(child => {
    if (child.classList.contains('filter-label')) currentLabel = child.textContent.toLowerCase().trim();
    if (child === el) inGroup = true;
  });

  // Just deactivate buttons in same type group
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${type}'`)) {
      b.classList.remove('active');
    }
  });
  el.classList.add('active');
  filters[type] = val;
  renderTab();
}

function renderTab() {
  if (currentTab === 'leaderboard') renderLeaderboard();
  else if (currentTab === 'h2h') renderH2H();
  else renderMonsters();
}

function renderLeaderboard() {
  const hunts = getFilteredHunts();
  const playerFilter = filters.player;

  // Build flat best times
  let rows = [];
  hunts.forEach(h => {
    const addPlayer = (run, player) => {
      if (!run) return;
      if (playerFilter !== 'all' && player !== playerFilter) return;
      rows.push({ ...run, playerName: player, hunt: h });
    };
    addPlayer(h.jeremy, 'Jeremy');
    addPlayer(h.matt, 'Matt');
  });

  // Sort: completed first (by time asc), then DNF
  rows.sort((a, b) => {
    if (a.bestTime !== null && b.bestTime !== null) return a.bestTime - b.bestTime;
    if (a.bestTime !== null) return -1;
    if (b.bestTime !== null) return 1;
    return 0;
  });

  const completed = rows.filter(r => r.bestTime !== null);
  const dnf = rows.filter(r => r.bestTime === null);

  const content = document.getElementById('mainContent');
  if (!rows.length) { content.innerHTML = '<div class="empty">No data matches your filters.</div>'; return; }

  const bestTime = completed.length ? completed[0].bestTime : null;

  let html = `<div class="section-header"><span class="section-title">Rankings</span><span class="count-badge">${completed.length} completed · ${dnf.length} DNF</span></div>`;
  html += `<div class="board-wrap"><table>
    <thead><tr>
      <th style="width:40px">#</th>
      <th>Hunt</th>
      <th>Player</th>
      <th class="num">Best Time</th>
      <th class="num">vs Leader</th>
    </tr></thead><tbody>`;

  completed.forEach((r, i) => {
    const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const varTag = variantTag(r.hunt.variant);
    const diff = r.bestTime - bestTime;
    const diffStr = i === 0 ? '<span style="color:var(--gold)">★ Best</span>' : `+${formatTime(diff)}`;
    html += `<tr>
      <td><div class="rank ${rankClass}">${i+1}</div></td>
      <td>
        <div class="monster-name">${r.hunt.monsterName || '—'} ${varTag}</div>
        <div class="meta">${r.tier ? stars(r.tier) + ' ' + r.tier : ''}</div>
      </td>
      <td><span class="player-pill pp-${r.playerName.toLowerCase()}"><span class="pp-dot"></span>${r.playerName}</span></td>
      <td class="num"><span class="time best">${formatTime(r.bestTime)}</span></td>
      <td class="num"><span class="diff">${diffStr}</span></td>
    </tr>`;
  });

  if (dnf.length && playerFilter === 'all') {
    html += `<tr><td colspan="5" style="padding:6px 16px;background:var(--surface2)"><span style="font-size:11px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase">DNF / Not Yet Cleared</span></td></tr>`;
    dnf.slice(0, 10).forEach(r => {
      const varTag = variantTag(r.hunt.variant);
      html += `<tr>
        <td><div class="rank">—</div></td>
        <td><div class="monster-name">${r.hunt.monsterName || '—'} ${varTag}</div><div class="meta">${r.tier ? stars(r.tier) + ' ' + r.tier : ''}</div></td>
        <td><span class="player-pill pp-${r.playerName.toLowerCase()}"><span class="pp-dot"></span>${r.playerName}</span></td>
        <td class="num"><span class="time dnf">DNF</span></td>
        <td class="num">—</td>
      </tr>`;
    });
    if (dnf.length > 10) html += `<tr><td colspan="5" style="text-align:center;padding:10px;font-size:12px;color:var(--muted)">…and ${dnf.length-10} more DNFs</td></tr>`;
  }

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function renderH2H() {
  const hunts = getFilteredHunts();
  let jWins = 0, mWins = 0, ties = 0;
  let jTotal = 0, mTotal = 0, jCount = 0, mCount = 0;

  const matchups = hunts.map(h => {
    const jt = h.jeremy?.bestTime ?? null;
    const mt = h.matt?.bestTime ?? null;
    let winner = null;
    if (jt !== null && mt !== null) {
      if (jt < mt) { jWins++; winner = 'Jeremy'; }
      else if (mt < jt) { mWins++; winner = 'Matt'; }
      else { ties++; winner = 'tie'; }
    }
    if (jt !== null) { jTotal += jt; jCount++; }
    if (mt !== null) { mTotal += mt; mCount++; }
    return { h, jt, mt, winner };
  });

  const content = document.getElementById('mainContent');
  let html = '';

  html += `<div class="h2h-grid">
    <div class="h2h-card">
      <div class="h2h-wins" style="color:var(--jeremy)">${jWins}</div>
      <div class="h2h-label" style="color:var(--jeremy)">Jeremy wins</div>
      ${jCount ? `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Avg: ${formatTime(jTotal/jCount)}</div>` : ''}
    </div>
    <div class="h2h-card">
      <div class="h2h-wins" style="color:var(--matt)">${mWins}</div>
      <div class="h2h-label" style="color:var(--matt)">Matt wins</div>
      ${mCount ? `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Avg: ${formatTime(mTotal/mCount)}</div>` : ''}
    </div>
  </div>
  ${ties ? `<div style="text-align:center;margin-bottom:16px;font-size:12px;color:var(--muted)">${ties} tie${ties>1?'s':''}</div>` : ''}`;

  const contested = matchups.filter(m => m.jt !== null && m.mt !== null);
  if (contested.length) {
    html += `<div class="section-header"><span class="section-title">Direct Matchups</span><span class="count-badge">${contested.length} hunts</span></div>`;
    html += `<div class="board-wrap"><table>
      <thead><tr>
        <th>Hunt</th>
        <th class="num" style="color:var(--jeremy)">Jeremy</th>
        <th class="num" style="color:var(--matt)">Matt</th>
        <th class="num">Diff</th>
      </tr></thead><tbody>`;
    contested.sort((a, b) => {
      const aBest = Math.min(a.jt, a.mt);
      const bBest = Math.min(b.jt, b.mt);
      return aBest - bBest;
    });
    contested.forEach(({ h, jt, mt, winner }) => {
      const diff = Math.abs(jt - mt);
      const jWon = winner === 'Jeremy';
      const mWon = winner === 'Matt';
      html += `<tr>
        <td><div class="monster-name">${h.monsterName} ${variantTag(h.variant)}</div></td>
        <td class="num"><span class="time" style="${jWon?'color:var(--jeremy)':''}">${formatTime(jt)}</span> ${jWon?'◀':''}</td>
        <td class="num"><span class="time" style="${mWon?'color:var(--matt)':''}">${formatTime(mt)}</span> ${mWon?'◀':''}</td>
        <td class="num"><span class="diff">${winner==='tie'?'tie':'+'+formatTime(diff)}</span></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  content.innerHTML = html;
}

function renderMonsters() {
  const hunts = getFilteredHunts();
  const playerFilter = filters.player;
  const content = document.getElementById('mainContent');

  let html = `<div class="section-header"><span class="section-title">All Hunts</span><span class="count-badge">${hunts.length} total</span></div>`;
  html += `<div class="monster-grid">`;

  hunts.forEach(h => {
    const jt = h.jeremy?.bestTime ?? null;
    const mt = h.matt?.bestTime ?? null;
    const jDone = jt !== null;
    const mDone = mt !== null;
    const leader = (jt !== null && mt !== null) ? (jt < mt ? 'jeremy' : mt < jt ? 'matt' : 'tie') : null;

    if (playerFilter === 'Jeremy' && !jDone) return;
    if (playerFilter === 'Matt' && !mDone) return;

    html += `<div class="monster-card">
      <div class="mc-header">
        <div class="mc-title">${h.monsterName}</div>
        <div class="mc-tier">${variantTag(h.variant)} ${h.tier ? '★'.repeat(parseInt(h.tier)||0) : ''}</div>
      </div>
      <div class="mc-times">`;

    if (playerFilter !== 'Matt') {
      html += `<div class="mc-row">
        <div class="mc-player"><div class="mc-dot" style="background:var(--jeremy)"></div><span style="font-size:12px;color:var(--muted)">Jeremy</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${leader==='jeremy'?'<span style="font-size:10px;color:var(--gold)">★</span>':''}
          <span class="${jDone?'time':'time dnf'}">${jDone?formatTime(jt):'DNF'}</span>
        </div>
      </div>`;
    }
    if (playerFilter !== 'Jeremy') {
      html += `<div class="mc-row">
        <div class="mc-player"><div class="mc-dot" style="background:var(--matt)"></div><span style="font-size:12px;color:var(--muted)">Matt</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${leader==='matt'?'<span style="font-size:10px;color:var(--gold)">★</span>':''}
          <span class="${mDone?'time':'time dnf'}">${mDone?formatTime(mt):'DNF'}</span>
        </div>
      </div>`;
    }

    html += `</div></div>`;
  });

  html += '</div>';
  content.innerHTML = html;
}

function variantTag(variant) {
  const v = (variant||'').toLowerCase();
  let cls = 'vt-base', label = variant || 'Base';
  if (v === 'tempered') cls = 'vt-tempered';
  else if (v === 'frenzied') cls = 'vt-frenzied';
  else if (v === 'alpha') cls = 'vt-alpha';
  return `<span class="variant-tag ${cls}">${label}</span>`;
}

loadData();
</script>

</html>
