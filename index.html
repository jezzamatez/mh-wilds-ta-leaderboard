<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunter Leaderboard</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b0f17; color: #e6edf3; }
    h1 { text-align: center; color: #ffb347; margin-top: 20px; margin-bottom: 10px; }

    .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .filter-btn { padding: 8px 16px; background: #151b28; border: 1px solid #2a3242; border-radius: 20px; color: #7f8ca3; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .filter-btn.active { background: #ffb347; color: #0b0f17; border-color: #ffb347; font-weight: bold; }

    .scoreboard { display: flex; justify-content: center; gap: 20px; margin: 15px auto; max-width: 900px; width: 95%; }
    .score { background: #151b28; padding: 12px 20px; border-radius: 10px; text-align: center; flex: 1; max-width: 440px; }
    .score-jeremy { border-bottom: 3px solid #4ea1ff; color: #4ea1ff; }
    .score-matt { border-bottom: 3px solid #ffb347; color: #ffb347; }
    .score span { display: block; font-size: 28px; font-weight: bold; margin-top: 8px; color: #e6edf3; }

    .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px auto; max-width: 900px; width: 95%; }
    .tab { flex: 1; padding: 12px; text-align: center; background: #151b28; border-radius: 8px; cursor: pointer; max-width: 445px; }
    .tab.active { color: #ffb347; font-weight: bold; background: #1c2333; }

    table { width: 98%; max-width: 1100px; margin: auto; border-collapse: collapse; table-layout: fixed; }
    th, td { padding: 8px 4px; text-align: left; white-space: nowrap; }

    .weapon-grid { max-width: 1400px; margin-bottom: 50px; }
    .weapon-header-cell { text-align: center; padding: 4px; width: 52px; border-bottom: 1px solid #2a3242; }
    .weapon-header-cell img { display: block; margin: 0 auto; width: 22px; height: 22px; }

    .monster-cell { vertical-align: middle; font-weight: bold; background: rgba(255, 255, 255, 0.02); border-right: 1px solid #1c2333; width: 180px; }
    .sub-row-player { font-size: 0.75rem; height: 50px; font-weight: 600; width: 60px; text-align: center; border-right: 1px solid #1c2333; vertical-align: middle; }
    
    .time-cell { text-align: center; font-family: 'Courier New', monospace; border-left: 1px solid #1c2333; font-size: 0.7rem; color: #7f8ca3; padding: 4px 1px; vertical-align: middle; }
    
    .cell-stack { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40px; gap: 4px; }
    .time-medal-row { display: flex; align-items: center; justify-content: center; gap: 5px; height: 24px; }

    .leaderboard-time-wrapper { display: inline-flex; align-items: center; justify-content: flex-end; gap: 6px; min-width: 80px; }
    
    .time-val { font-weight: bold; }
    .time-val[title] { cursor: help; text-decoration: underline dotted rgba(255, 255, 255, 0.2); }
    
    .time-link { text-decoration: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: filter 0.2s; }
    .time-link:hover { filter: brightness(1.4); }
    
    .play-button-spacer { width: 14px; height: 10px; display: inline-block; }
    .play-svg-container { display: flex; align-items: center; justify-content: center; width: 14px; height: 10px; background-color: #FF0000; border-radius: 2px; }
    .play-svg { width: 7px; height: 7px; fill: white; }
    
    .jeremy-time { color: #4ea1ff !important; }
    .matt-time { color: #ffb347 !important; }
    
    .tier-row td { padding: 15px 10px 5px 10px; font-weight: bold; color: #ffb347; background: rgba(255, 179, 71, 0.05); border-bottom: 1px solid #2a3242; }
    .cell-flex { display: flex; align-items: center; gap: 8px; }

    .icon { width: 34px; height: 34px; object-fit: contain; transition: transform 0.2s ease; flex-shrink: 0; }
    .tempered-glow { filter: drop-shadow(0 0 5px rgba(163, 73, 255, 0.6)); }

    /* POPPING CROWNS */
    .crown-icon { 
      width: 22px; 
      height: 22px; 
      flex-shrink: 0; 
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .gold-crown { 
      filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.8));
      animation: crown-glow 3s infinite alternate;
    }
    .silver-crown { filter: drop-shadow(0 0 3px rgba(192, 192, 192, 0.6)); }

    @keyframes crown-glow {
      from { filter: drop-shadow(0 0 2px rgba(255, 215, 0, 0.4)); }
      to { filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.9)); }
    }

    /* WEAPON GRID HOVER LOGIC: Highlight monster AND crowns when either player row is hovered */
    .weapon-grid tr.row-jeremy:hover .icon, 
    .weapon-grid tr.row-matt:hover .icon,
    .weapon-grid tr.row-jeremy:hover + tr.row-matt .icon,
    .weapon-grid tr:has(+ tr.row-matt:hover) .icon,
    .weapon-grid tr.row-jeremy:hover .crown-icon, 
    .weapon-grid tr.row-matt:hover .crown-icon,
    .weapon-grid tr.row-jeremy:hover + tr.row-matt .crown-icon,
    .weapon-grid tr:has(+ tr.row-matt:hover) .crown-icon { 
      transform: scale(1.25); 
    }
    
    /* Slight rotation specifically for crowns on hover */
    .weapon-grid tr.row-jeremy:hover .crown-icon, 
    .weapon-grid tr.row-matt:hover .crown-icon,
    .weapon-grid tr.row-jeremy:hover + tr.row-matt .crown-icon,
    .weapon-grid tr:has(+ tr.row-matt:hover) .crown-icon {
      transform: scale(1.4) rotate(-5deg);
    }

    /* Leaderboard Tab Hover */
    .leaderboard-table tr:hover .crown-icon { transform: scale(1.4) rotate(-5deg); }

    .player.jeremy { color: #4ea1ff; }
    .player.matt { color: #ffb347; }
    tr.row-jeremy { border-left: 3px solid #4ea1ff; }
    tr.row-matt { border-left: 3 solid #ffb347; }

    #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #videoContainer { position: relative; width: 80%; max-width: 900px; aspect-ratio: 16/9; background: #000; }
    #closeVideo { position: absolute; top: -40px; right: 0; color: white; font-size: 24px; cursor: pointer; font-weight: bold; }

    #lastUpdated { text-align: center; margin: 30px auto; color: #7f8ca3; font-size: 0.8rem; }
  </style>
</head>
<body>

<h1>Hunter Leaderboard</h1>

<div class="filter-bar">
  <div id="btnTA" class="filter-btn active" onclick="setRunFilter('TA')">TA Rules</div>
  <div id="btnFreestyle" class="filter-btn" onclick="setRunFilter('Freestyle')">Freestyle</div>
</div>

<div class="scoreboard">
  <div class="score score-jeremy">Jeremy <span id="jeremyCount">0</span></div>
  <div class="score score-matt">Matt <span id="mattCount">0</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('weapons', this)">Weapon Times</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<div id="videoOverlay" onclick="closeVideo()">
  <div id="videoContainer" onclick="event.stopPropagation()">
    <span id="closeVideo" onclick="closeVideo()">&times; Close</span>
    <iframe id="videoFrame" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

const GOLD_CROWN = "https://www.phantombrawlers.com/static/mhwilds/Icons/King%20Crown.png";
const SILVER_CROWN = "https://www.phantombrawlers.com/static/mhwilds/Icons/Big%20Crown.png";

const PLAY_BUTTON_HTML = `
  <div class="play-svg-container">
    <svg class="play-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>`;

let allRunsRaw = [];
let monsterIcons = {};
let monsterTiers = {};
let weaponIcons = {};
let weaponOrder = []; 
let currentView = 'leaderboard';
let currentRunFilter = 'TA'; 

const clean = (s) => s ? s.toString().trim() : '';

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) { row.push(current); current = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) { row.push(current); rows.push(row); row = []; current = ''; }
    } else current += char;
  }
  if (current || row.length) { row.push(current); rows.push(row); }
  return rows;
}

function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf') || s === "" || s.includes('n/a')) return null;
  const m = s.match(/^(\d+):(\d+)(\.\d+)?/);
  if (!m) return null;
  const mins = parseInt(m[1]), secs = parseInt(m[2]), ms = m[3] ? parseFloat(m[3]) : 0;
  return (mins * 60) + secs + ms;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60), s = Math.floor(secs % 60), ms = (secs % 1).toFixed(2).substring(1);
  return `${m}:${s.toString().padStart(2, '0')}${ms === '.00' ? '' : ms}`;
}

function getEmbedUrl(url) {
  if (!url) return "";
  let id = "";
  if (url.includes("v=")) id = url.split("v=")[1].split("&")[0];
  else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split("?")[0];
  return id ? `https://www.youtube.com/embed/${id}?autoplay=1` : url;
}

function openVideo(url) {
  const embed = getEmbedUrl(url);
  document.getElementById('videoFrame').src = embed;
  document.getElementById('videoOverlay').style.display = 'flex';
}

function closeVideo() {
  document.getElementById('videoOverlay').style.display = 'none';
  document.getElementById('videoFrame').src = '';
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = "Syncing...";
  try {
    const ts = Date.now();
    const [runsRes, mRes, wRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes), mRows = parseCSV(mRes), wRows = parseCSV(wRes);

    monsterIcons = {}; monsterTiers = {};
    mRows.slice(1).forEach(r => {
      const name = clean(r[1]).toLowerCase();
      monsterTiers[name] = clean(r[0]); 
      monsterIcons[name] = clean(r[3]);
    });

    weaponIcons = {}; weaponOrder = [];
    wRows.slice(1).forEach(r => {
      const wName = clean(r[0]);
      weaponOrder.push(wName);
      weaponIcons[wName.toLowerCase()] = clean(r[2]);
    });

    const headers = runRows[0].map(h => h.toLowerCase().trim());
    const cP = headers.indexOf('player'), cR = headers.indexOf('run'), cM = headers.indexOf('monster'), 
          cW = headers.indexOf('weapon'), cT = headers.indexOf('duration'), cV = headers.indexOf('link');

    allRunsRaw = runRows.slice(1).map((r, idx) => ({
      player: clean(r[cP]),
      runType: clean(r[cR]),
      monster: clean(r[cM]),
      weapon: clean(r[cW]),
      timeSecs: parseTime(clean(r[cT])),
      link: clean(r[cV]),
      id: idx
    })).filter(r => r.timeSecs !== null);

    render();
    document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) { console.error(e); }
}

function setRunFilter(type) {
  currentRunFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn${type}`).classList.add('active');
  render();
}

function switchTab(view, el) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  let filtered = allRunsRaw.filter(r => r.runType === currentRunFilter);
  const uniqueBestMap = new Map();
  filtered.forEach(r => {
    const key = `${r.player.toLowerCase()}|${r.monster.toLowerCase()}|${r.weapon.toLowerCase()}`;
    if (!uniqueBestMap.has(key) || r.timeSecs < uniqueBestMap.get(key).timeSecs) {
      uniqueBestMap.set(key, r);
    }
  });
  filtered = Array.from(uniqueBestMap.values());
  const monsterStats = {};
  filtered.forEach(r => {
    const m = r.monster.toLowerCase();
    if (!monsterStats[m]) monsterStats[m] = [];
    monsterStats[m].push(r);
  });
  for (let m in monsterStats) { monsterStats[m].sort((a, b) => a.timeSecs - b.timeSecs); }

  if (currentView === 'leaderboard') renderLeaderboard(filtered, monsterStats);
  else renderWeaponTimes(filtered, monsterStats);
}

function renderLeaderboard(filtered, monsterStats) {
  const bestOfEach = Object.values(monsterStats).map(list => list[0]);
  const grouped = {};
  bestOfEach.forEach(r => {
    const tier = monsterTiers[r.monster.toLowerCase()] || 'Other';
    if (!grouped[tier]) grouped[tier] = [];
    grouped[tier].push(r);
  });

  let jW = 0, mW = 0;
  bestOfEach.forEach(r => { if (r.player.toLowerCase().includes('jeremy')) jW++; else mW++; });
  document.getElementById('jeremyCount').textContent = jW;
  document.getElementById('mattCount').textContent = mW;

  let html = `<table class="leaderboard-table"><thead><tr><th style="width:200px">Monster</th><th>Player</th><th>Weapon</th><th style="text-align:right">Time</th></tr></thead><tbody>`;
  Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="4">${tier}</td></tr>`;
    grouped[tier].forEach(r => {
      const isJeremy = r.player.toLowerCase().includes('jeremy');
      const timeStr = formatTime(r.timeSecs);
      const isTempered = r.monster.toLowerCase().includes('tempered');
      const playBtn = r.link ? `<span onclick="openVideo('${r.link}')" class="time-link">${PLAY_BUTTON_HTML}</span>` : `<span class="play-button-spacer"></span>`;
      
      html += `<tr class="row-${isJeremy ? 'jeremy' : 'matt'}">
        <td><div class="cell-flex">${monsterIcons[r.monster.toLowerCase()] ? `<img src="${monsterIcons[r.monster.toLowerCase()]}" class="icon ${isTempered ? 'tempered-glow' : ''}">` : ''}${r.monster}</div></td>
        <td class="player ${isJeremy ? 'jeremy' : 'matt'}">${r.player}</td>
        <td><div class="cell-flex">${weaponIcons[r.weapon.toLowerCase()] ? `<img src="${weaponIcons[r.weapon.toLowerCase()]}" class="icon" style="width:18px;height:18px">` : ''}${r.weapon}</div></td>
        <td style="text-align:right">
          <div class="leaderboard-time-wrapper">
            <span class="${isJeremy ? 'jeremy-time' : 'matt-time'} time-val">${timeStr}</span>
            ${playBtn}
          </div>
        </td>
      </tr>`;
    });
  });
  document.getElementById('mainContent').innerHTML = html + '</tbody></table>';
}

function renderWeaponTimes(filtered, monsterStats) {
  const monsters = [...new Set(filtered.map(r => r.monster))];
  const groupedByTier = {};
  monsters.forEach(m => {
    const t = monsterTiers[m.toLowerCase()] || 'Other';
    if (!groupedByTier[t]) groupedByTier[t] = [];
    groupedByTier[t].push(m);
  });

  let html = `<table class="weapon-grid"><thead><tr><th style="width:180px">Monster</th><th style="width:60px"></th>`;
  weaponOrder.forEach(w => {
    const icon = weaponIcons[w.toLowerCase()];
    html += `<th class="weapon-header-cell">${icon ? `<img src="${icon}" title="${w}">` : w}</th>`;
  });
  html += `</tr></thead><tbody>`;

  const lookup = {};
  filtered.forEach(r => {
    const p = r.player.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';
    const mKey = r.monster.toLowerCase();
    const wKey = r.weapon.toLowerCase();

    // Time Delta Logic: Difference between this run and the fastest overall for this weapon/monster
    const weaponRuns = filtered.filter(f => f.monster.toLowerCase() === mKey && f.weapon.toLowerCase() === wKey);
    weaponRuns.sort((a, b) => a.timeSecs - b.timeSecs);
    const fastestVal = weaponRuns[0].timeSecs;
    
    let deltaStr = "Fastest time";
    if (r.timeSecs > fastestVal) {
      const diff = r.timeSecs - fastestVal;
      deltaStr = `${formatTime(diff)} slower than fastest ${r.weapon}`;
    }

    const rank = monsterStats[mKey].indexOf(r);
    let medal = "";
    if(rank === 0) medal = `<img src="${GOLD_CROWN}" class="crown-icon gold-crown">`;
    else if(rank === 1) medal = `<img src="${SILVER_CROWN}" class="crown-icon silver-crown">`;

    const timeStr = formatTime(r.timeSecs);
    const linkHtml = r.link ? `<span onclick="openVideo('${r.link}')" class="time-link">${PLAY_BUTTON_HTML}</span>` : '<div style="height:10px"></div>';
    
    lookup[`${p}|${mKey}|${wKey}`] = `
      <div class="cell-stack">
        <div class="time-medal-row">
          <span class="time-val ${p === 'jeremy' ? 'jeremy-time' : 'matt-time'}" title="${deltaStr}">${timeStr}</span>
          ${medal}
        </div>
        ${linkHtml}
      </div>`;
  });

  Object.keys(groupedByTier).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="${weaponOrder.length + 2}">${tier}</td></tr>`;
    groupedByTier[tier].forEach(m => {
      const mKey = m.toLowerCase();
      const isTempered = mKey.includes('tempered');
      ['jeremy', 'matt'].forEach(p => {
        html += `<tr class="row-${p}">
          ${p === 'jeremy' ? `<td rowspan="2" class="monster-cell"><div class="cell-flex">${monsterIcons[mKey] ? `<img src="${monsterIcons[mKey]}" class="icon ${isTempered ? 'tempered-glow' : ''}">` : ''}${m}</div></td>` : ''}
          <td class="player ${p} sub-row-player">${p.charAt(0).toUpperCase() + p.slice(1)}</td>`;
        weaponOrder.forEach(w => {
          const cellData = lookup[`${p}|${mKey}|${w.toLowerCase()}`];
          html += `<td class="time-cell">${cellData || '-'}</td>`;
        });
        html += `</tr>`;
      });
    });
  });
  document.getElementById('mainContent').innerHTML = html + `</tbody></table>`;
}

loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
