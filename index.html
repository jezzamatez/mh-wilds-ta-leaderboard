<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Wilds — Time Attack Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8a020;
    --accent2: #c06010;
    --jeremy: #3b82f6;
    --matt: #10b981;
    --text: #f0ede8;
    --muted: #7a8090;
    --danger: #e05050;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a1200 50%, #0d0f14 100%);
    border-bottom: 1px solid var(--border2);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); opacity: 0.5; font-weight: 400; }
  .last-updated {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-left: 12px;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LAYOUT */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* PLAYER BADGES */
  .players {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }
  .player-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    flex: 1;
    max-width: 280px;
  }
  .player-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .player-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .player-stat {
    margin-left: auto;
    text-align: right;
  }
  .player-stat .num { font-size: 20px; font-weight: 500; font-family: 'Rajdhani', sans-serif; }
  .player-stat .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .divider { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* LEADERBOARD TABLE */
  .board-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 16px;
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th.num { text-align: right; }
  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rank {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    width: 32px;
    text-align: center;
    color: var(--muted);
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }

  .monster-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .variant-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
  .vt-tempered { background: rgba(232,160,32,0.15); color: var(--accent); border: 1px solid rgba(232,160,32,0.3); }
  .vt-frenzied { background: rgba(224,80,80,0.15); color: var(--danger); border: 1px solid rgba(224,80,80,0.3); }
  .vt-alpha { background: rgba(59,130,246,0.15); color: var(--jeremy); border: 1px solid rgba(59,130,246,0.3); }
  .vt-base { background: rgba(122,128,144,0.15); color: var(--muted); border: 1px solid rgba(122,128,144,0.3); }

  .time {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .time.dnf { color: var(--muted); font-size: 13px; font-weight: 400; letter-spacing: 0; }
  .time.best { color: var(--accent); }

  .player-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 12px;
  }
  .pp-jeremy { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .pp-matt { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .pp-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pp-jeremy .pp-dot { background: var(--jeremy); }
  .pp-matt .pp-dot { background: var(--matt); }

  .diff {
    font-size: 12px;
    font-family: 'Rajdhani', sans-serif;
  }
  .diff.faster { color: var(--matt); }
  .diff.slower { color: var(--danger); }
  .diff.tied { color: var(--muted); }

  /* HEAD TO HEAD */
  .h2h-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .h2h-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .h2h-wins {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .h2h-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  /* MONSTER DETAILS VIEW */
  .monster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .monster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .monster-card:hover { border-color: var(--border2); }
  .mc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .mc-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .mc-tier {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .mc-times {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .mc-player { display: flex; align-items: center; gap: 7px; }
  .mc-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--danger); text-align: center; padding: 40px; }

  /* STAR TIER */
  .star { color: var(--accent); font-size: 11px; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .h2h-grid { grid-template-columns: 1fr 1fr; }
    .players { flex-direction: column; }
    .player-badge { max-width: 100%; }
    td, th { padding: 8px 10px; }
    .filters { gap: 6px; }
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .count-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 9px;
    border-radius: 10px;
  }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">MH Wilds <span>/ Time Attack</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="last-updated" id="lastUpdated">Loading...</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
</header>

<main>
  <!-- Player Summary -->
  <div class="players" id="playerSummary">
    <div class="player-badge">
      <div class="player-dot" style="background:var(--jeremy)"></div>
      <div class="player-name" style="color:var(--jeremy)">Jeremy</div>
      <div class="player-stat">
        <div class="num" id="jeremyCount">—</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
    <div class="player-badge">
      <div class="player-dot" style="background:var(--matt)"></div>
      <div class="player-name" style="color:var(--matt)">Matt</div>
      <div class="player-stat">
        <div class="num" id="mattCount">—</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
  </div>

  <!-- View Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('leaderboard', this)">Best Times</div>
    <div class="tab" onclick="switchTab('h2h', this)">Head to Head</div>
    <div class="tab" onclick="switchTab('monsters', this)">By Monster</div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span class="filter-label">Variant</span>
    <button class="filter-btn active" onclick="setFilter('variant','all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('variant','Tempered',this)">Tempered</button>
    <button class="filter-btn" onclick="setFilter('variant','Frenzied',this)">Frenzied</button>
    <button class="filter-btn" onclick="setFilter('variant','Alpha',this)">Alpha</button>
    <button class="filter-btn" onclick="setFilter('variant','Base',this)">Base</button>
    <div class="divider"></div>
    <span class="filter-label">Player</span>
    <button class="filter-btn active" onclick="setFilter('player','all',this)">Both</button>
    <button class="filter-btn" onclick="setFilter('player','Jeremy',this)">Jeremy</button>
    <button class="filter-btn" onclick="setFilter('player','Matt',this)">Matt</button>
  </div>

  <!-- Main content area -->
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div>Loading leaderboard data...</div>
  </div>
</main>

<script>
const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR8i7-4hmloDOdy0JKUAGCJdwGwlsToeFPTucntnVRQ5v4D15LP8sPoAsCidu2LaABWxIw3qHwTjSrF/gviz/tq?tqx=out:json';
const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';
const DNF_TIME = 59 * 60;

let allRuns = [];
let filters = { variant: 'all', player: 'all' };
let currentTab = 'leaderboard';

function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf') || s === '') return null;
  if (s.includes('date')) {
    const parts = s.match(/\d+/g);
    if (parts && parts.length >= 6) return (parseInt(parts[4]) * 60) + parseInt(parts[5]);
  }
  const m = s.match(/^(\d+):(\d+)(\.\d+)?$/);
  if (!m) return null;
  return (parseInt(m[1]) * 60) + parseInt(m[2]) + (m[3] ? parseFloat(m[3]) : 0);
}

function formatTime(secs) {
  if (secs === null || isNaN(secs) || secs >= DNF_TIME) return 'DNF';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function pairHunts(runs) {
  const paired = {};
  runs.forEach(run => {
    const key = `${run.variant}-${run.monsterName}`.toLowerCase().replace(/\s/g, '');
    if (!paired[key]) {
      paired[key] = { 
        monsterName: run.monsterName, 
        icon: run.monsterIcon, 
        variant: run.variant 
      };
    }
    const p = run.player.toLowerCase();
    if (p.includes('jeremy')) paired[key].jeremy = run;
    if (p.includes('matt')) paired[key].matt = run;
  });
  return Object.values(paired);
}

async function loadData() {
  const content = document.getElementById('mainContent');
  document.getElementById('lastUpdated').textContent = 'Syncing...';

  try {
    const [runsRes, monsterRes, weaponRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}`).then(r => r.text())
    ]);

    const cleanJSON = (txt) => {
      const start = txt.indexOf('{');
      const end = txt.lastIndexOf('}') + 1;
      return JSON.parse(txt.substring(start, end));
    };

    const runRows = cleanJSON(runsRes).table.rows;
    const monsterRows = cleanJSON(monsterRes).table.rows;
    const weaponRows = cleanJSON(weaponRes).table.rows;

    const monsterMap = {};
    monsterRows.forEach(r => { if(r.c[0] && r.c[1]) monsterMap[r.c[0].v] = r.c[1].v; });
    
    const weaponMap = {};
    weaponRows.forEach(r => { if(r.c[0] && r.c[1]) weaponMap[r.c[0].v] = r.c[1].v; });

    allRuns = [];
    runRows.forEach(row => {
      const cells = row.c;
      if (!cells || !cells[3] || !cells[3].v) return;
      const mName = cells[1]?.v || 'Unknown';
      const wName = cells[4]?.v || 'Unknown';
      allRuns.push({
        variant: cells[0]?.v || 'Base',
        monsterName: mName,
        monsterIcon: monsterMap[mName] || '👾',
        player: cells[3]?.v || '',
        weaponName: wName,
        weaponIcon: weaponMap[wName] || '⚔️',
        bestTime: parseTime(cells[8]?.v || cells[8]?.f)
      });
    });

    window._hunts = pairHunts(allRuns);
    updateStats();
    renderTab();
    document.getElementById('lastUpdated').textContent = `Live Sync: ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    console.error(e);
    content.innerHTML = `<div class="error"><b>Sync Error:</b> ${e.message}</div>`;
  }
}

function renderLeaderboard() {
  const hunts = getFilteredHunts();
  const playerFilter = filters.player;
  let rows = [];
  hunts.forEach(h => {
    if ((playerFilter === 'all' || playerFilter === 'Jeremy') && h.jeremy) rows.push({ ...h.jeremy, playerName: 'Jeremy', hunt: h });
    if ((playerFilter === 'all' || playerFilter || 'Matt') && h.matt) rows.push({ ...h.matt, playerName: 'Matt', hunt: h });
  });
  rows.sort((a, b) => (a.bestTime || 999999) - (b.bestTime || 999999));
  
  let html = `<div class="board-wrap"><table><thead><tr><th>#</th><th>Hunt</th><th>Player</th><th class="num">Time</th></tr></thead><tbody>`;
  rows.forEach((r, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td>${r.hunt.icon} <span class="monster-name">${r.hunt.monsterName}</span> ${variantTag(r.variant)}
          <div class="meta">${r.weaponIcon} ${r.weaponName}</div></td>
      <td><span class="player-pill pp-${r.playerName.toLowerCase()}"><span class="pp-dot"></span>${r.playerName}</span></td>
      <td class="num time">${formatTime(r.bestTime)}</td>
    </tr>`;
  });
  document.getElementById('mainContent').innerHTML = html + '</tbody></table></div>';
}

function renderH2H() {
  const hunts = getFilteredHunts();
  let jWins = 0, mWins = 0;
  hunts.forEach(h => {
    if (h.jeremy?.bestTime && h.matt?.bestTime) {
      if (h.jeremy.bestTime < h.matt.bestTime) jWins++;
      else if (h.matt.bestTime < h.jeremy.bestTime) mWins++;
    }
  });
  document.getElementById('mainContent').innerHTML = `
    <div class="h2h-grid">
      <div class="h2h-card"><div class="h2h-wins" style="color:var(--jeremy)">${jWins}</div><div class="h2h-label">Jeremy</div></div>
      <div class="h2h-card"><div class="h2h-wins" style="color:var(--matt)">${mWins}</div><div class="h2h-label">Matt</div></div>
    </div>`;
}

function renderMonsters() {
  const hunts = getFilteredHunts();
  let html = '<div class="monster-grid">';
  hunts.forEach(h => {
    html += `<div class="monster-card">
      <div class="mc-header"><div class="mc-title">${h.icon} ${h.monsterName}</div></div>
      <div class="mc-times">
        <div class="mc-row">Jeremy: <b>${formatTime(h.jeremy?.bestTime)}</b></div>
        <div class="mc-row">Matt: <b>${formatTime(h.matt?.bestTime)}</b></div>
      </div>
    </div>`;
  });
  document.getElementById('mainContent').innerHTML = html + '</div>';
}

function getFilteredHunts() {
  let hunts = window._hunts || [];
  if (filters.variant !== 'all') hunts = hunts.filter(h => h.variant.toLowerCase() === filters.variant.toLowerCase());
  return hunts;
}

function updateStats() {
  const hunts = window._hunts || [];
  let jCount = 0, mCount = 0;
  hunts.forEach(h => {
    if (h.jeremy?.bestTime) jCount++;
    if (h.matt?.bestTime) mCount++;
  });
  document.getElementById('jeremyCount').textContent = jCount;
  document.getElementById('mattCount').textContent = mCount;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  renderTab();
}

function renderTab() {
  if (currentTab === 'leaderboard') renderLeaderboard();
  else if (currentTab === 'h2h') renderH2H();
  else renderMonsters();
}

function setFilter(type, val, el) {
  el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filters[type] = val;
  renderTab();
}

function variantTag(variant) {
  const v = (variant||'').toLowerCase();
  let cls = v === 'tempered' ? 'vt-tempered' : v === 'frenzied' ? 'vt-frenzied' : v === 'alpha' ? 'vt-alpha' : 'vt-base';
  return `<span class="variant-tag ${cls}">${variant || 'Base'}</span>`;
}

loadData();
</script>
</body>
</html>
