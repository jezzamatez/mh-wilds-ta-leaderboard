<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunter Leaderboard</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b0f17; color: #e6edf3; }
    h1 { text-align: center; color: #ffb347; margin-top: 20px; margin-bottom: 10px; }

    /* Filters & Tabs */
    .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .filter-btn { padding: 8px 16px; background: #151b28; border: 1px solid #2a3242; border-radius: 20px; color: #7f8ca3; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .filter-btn.active { background: #ffb347; color: #0b0f17; border-color: #ffb347; font-weight: bold; }

    .scoreboard { display: flex; justify-content: space-between; gap: 20px; margin: 15px auto; max-width: 900px; width: 95%; }
    .score { background: #151b28; padding: 12px 20px; border-radius: 10px; text-align: center; flex: 1; max-width: 440px; }
    .score-jeremy { border-bottom: 3px solid #4ea1ff; color: #4ea1ff; }
    .score-matt { border-bottom: 3px solid #ffb347; color: #ffb347; }
    .score span { display: block; font-size: 28px; font-weight: bold; margin-top: 8px; color: #e6edf3; }

    .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px auto; max-width: 900px; width: 95%; }
    .tab { flex: 1; padding: 12px; text-align: center; background: #151b28; border-radius: 8px; cursor: pointer; max-width: 445px; }
    .tab.active { color: #ffb347; font-weight: bold; background: #1c2333; }

    table { width: 95%; max-width: 950px; margin: auto; border-collapse: collapse; table-layout: fixed; }
    th, td { padding: 8px 10px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .weapon-grid { table-layout: auto; width: 98%; max-width: 1300px; margin-bottom: 50px; }
    .weapon-header-cell { text-align: center; padding: 4px; width: 45px; min-width: 45px; border-bottom: 1px solid #2a3242; }
    .weapon-header-cell img { display: block; margin: 0 auto; width: 24px; height: 24px; }

    .monster-cell { vertical-align: middle; font-weight: bold; background: rgba(255, 255, 255, 0.02); border-right: 1px solid #1c2333; width: 200px; }
    .sub-row-player { font-size: 0.8rem; height: 30px; font-weight: 600; width: 85px; }
    
    .time-cell { text-align: center; font-family: monospace; border-left: 1px solid #1c2333; font-size: 0.8rem; color: #7f8ca3; }
    .time-link { text-decoration: none; font-weight: bold; cursor: pointer; }
    .time-link:hover { text-decoration: underline; }
    
    .jeremy-time { color: #4ea1ff !important; }
    .matt-time { color: #ffb347 !important; }
    
    .tier-row td { padding: 15px 10px 5px 10px; font-weight: bold; color: #ffb347; background: rgba(255, 179, 71, 0.05); border-bottom: 1px solid #2a3242; }
    .cell-flex { display: flex; align-items: center; gap: 8px; }
    .icon { width: 24px; height: 24px; object-fit: contain; }
    .crown-icon { width: 18px; height: 18px; vertical-align: middle; margin-left: 4px; }

    .player.jeremy { color: #4ea1ff; }
    .player.matt { color: #ffb347; }
    tr.row-jeremy { border-left: 3px solid #4ea1ff; }
    tr.row-matt { border-left: 3px solid #ffb347; }

    #lastUpdated { text-align: center; margin: 30px auto; color: #7f8ca3; font-size: 0.8rem; }
  </style>
</head>
<body>

<h1>Hunter Leaderboard</h1>

<div class="filter-bar">
  <div id="btnTA" class="filter-btn active" onclick="setRunFilter('TA')">TA Rules</div>
  <div id="btnFreestyle" class="filter-btn" onclick="setRunFilter('Freestyle')">Freestyle</div>
</div>

<div class="scoreboard">
  <div class="score score-jeremy">Jeremy <span id="jeremyCount">0</span></div>
  <div class="score score-matt">Matt <span id="mattCount">0</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('weapons', this)">Weapon Times</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<script>
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

const GOLD_CROWN = "https://cdn-icons-png.flaticon.com/512/2583/2583344.png";
const SILVER_CROWN = "https://cdn-icons-png.flaticon.com/512/2583/2583350.png";

let allRunsRaw = [];
let monsterIcons = {};
let monsterTiers = {};
let weaponIcons = {};
let weaponOrder = []; 
let currentView = 'leaderboard';
let currentRunFilter = 'TA'; 

const clean = (s) => s ? s.toString().trim() : '';

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) { row.push(current); current = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) { row.push(current); rows.push(row); row = []; current = ''; }
    } else current += char;
  }
  if (current || row.length) { row.push(current); rows.push(row); }
  return rows;
}

function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf') || s === "" || s.includes('n/a')) return null;
  const m = s.match(/^(\d+):(\d+)(\.\d+)?/);
  if (!m) return null;
  const mins = parseInt(m[1]), secs = parseInt(m[2]), ms = m[3] ? parseFloat(m[3]) : 0;
  return mins >= 59 ? null : (mins * 60) + secs + ms;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60), s = Math.floor(secs % 60), ms = (secs % 1).toFixed(2).substring(1);
  return `${m}:${s.toString().padStart(2, '0')}${ms === '.00' ? '' : ms}`;
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = "Syncing...";
  try {
    const ts = Date.now();
    const [runsRes, mRes, wRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes), mRows = parseCSV(mRes), wRows = parseCSV(wRes);

    monsterIcons = {}; monsterTiers = {};
    mRows.slice(1).forEach(r => {
      const name = clean(r[1]).toLowerCase();
      monsterTiers[name] = clean(r[0]); 
      monsterIcons[name] = clean(r[3]);
    });

    weaponIcons = {}; weaponOrder = [];
    wRows.slice(1).forEach(r => {
      const wName = clean(r[0]);
      weaponOrder.push(wName);
      weaponIcons[wName.toLowerCase()] = clean(r[2]);
    });

    const headers = runRows[0].map(h => h.toLowerCase().trim());
    const cP = headers.indexOf('player'), cR = headers.indexOf('run'), cM = headers.indexOf('monster'), 
          cW = headers.indexOf('weapon'), cT = headers.indexOf('duration'), cV = headers.indexOf('link');

    allRunsRaw = runRows.slice(1).map((r, idx) => ({
      player: clean(r[cP]),
      runType: clean(r[cR]),
      monster: clean(r[cM]),
      weapon: clean(r[cW]),
      timeSecs: parseTime(clean(r[cT])),
      link: clean(r[cV]),
      id: idx
    })).filter(r => r.timeSecs !== null);

    render();
    document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) { console.error(e); }
}

function setRunFilter(type) {
  currentRunFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn${type}`).classList.add('active');
  render();
}

function switchTab(view, el) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const filtered = allRunsRaw.filter(r => r.runType === currentRunFilter);
  
  // Calculate Global Rankings per Monster (regardless of player/weapon)
  const monsterStats = {};
  filtered.forEach(r => {
    const m = r.monster.toLowerCase();
    if (!monsterStats[m]) monsterStats[m] = [];
    monsterStats[m].push(r);
  });
  
  for (let m in monsterStats) {
    // Sort absolute times to determine global gold/silver
    monsterStats[m].sort((a, b) => a.timeSecs - b.timeSecs);
  }

  if (currentView === 'leaderboard') {
    renderLeaderboard(filtered, monsterStats);
  } else {
    renderWeaponTimes(filtered, monsterStats);
  }
}

function renderLeaderboard(filtered, monsterStats) {
  // Main leaderboard shows the absolute fastest run for each monster
  const bestOfEach = Object.values(monsterStats).map(list => list[0]);
  const grouped = {};
  bestOfEach.forEach(r => {
    const tier = monsterTiers[r.monster.toLowerCase()] || 'Other';
    if (!grouped[tier]) grouped[tier] = [];
    grouped[tier].push(r);
  });

  let jW = 0, mW = 0;
  bestOfEach.forEach(r => { 
    if (r.player.toLowerCase().includes('jeremy')) jW++; else mW++; 
  });
  document.getElementById('jeremyCount').textContent = jW;
  document.getElementById('mattCount').textContent = mW;

  let html = `<table><thead><tr><th>Monster</th><th>Player</th><th>Weapon</th><th style="text-align:right">Time</th></tr></thead><tbody>`;
  Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="4">${tier}</td></tr>`;
    grouped[tier].forEach(r => {
      const isJeremy = r.player.toLowerCase().includes('jeremy');
      const timeStr = formatTime(r.timeSecs);
      const timeHtml = r.link ? `<a href="${r.link}" target="_blank" class="time-link ${isJeremy ? 'jeremy-time' : 'matt-time'}">${timeStr}</a>` : `<span class="${isJeremy ? 'jeremy-time' : 'matt-time'}">${timeStr}</span>`;
      
      html += `<tr class="row-${isJeremy ? 'jeremy' : 'matt'}">
        <td><div class="cell-flex">${monsterIcons[r.monster.toLowerCase()] ? `<img src="${monsterIcons[r.monster.toLowerCase()]}" class="icon">` : ''}${r.monster}</div></td>
        <td class="player ${isJeremy ? 'jeremy' : 'matt'}">${r.player}</td>
        <td><div class="cell-flex">${weaponIcons[r.weapon.toLowerCase()] ? `<img src="${weaponIcons[r.weapon.toLowerCase()]}" class="icon" style="width:20px">` : ''}${r.weapon}</div></td>
        <td style="text-align:right">${timeHtml}</td>
      </tr>`;
    });
  });
  document.getElementById('mainContent').innerHTML = html + '</tbody></table>';
}

function renderWeaponTimes(filtered, monsterStats) {
  const monsters = [...new Set(filtered.map(r => r.monster))];
  const groupedByTier = {};
  monsters.forEach(m => {
    const t = monsterTiers[m.toLowerCase()] || 'Other';
    if (!groupedByTier[t]) groupedByTier[t] = [];
    groupedByTier[t].push(m);
  });

  let html = `<table class="weapon-grid"><thead><tr><th>Monster</th><th></th>`;
  weaponOrder.forEach(w => {
    const icon = weaponIcons[w.toLowerCase()];
    html += `<th class="weapon-header-cell">${icon ? `<img src="${icon}" title="${w}">` : w}</th>`;
  });
  html += `</tr></thead><tbody>`;

  const lookup = {};
  filtered.forEach(r => {
    const p = r.player.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';
    const mKey = r.monster.toLowerCase();
    
    // Explicitly find the rank in the pre-sorted global list
    const rank = monsterStats[mKey].indexOf(r);
    let crown = "";
    if(rank === 0) crown = `<img src="${GOLD_CROWN}" class="crown-icon">`;
    else if(rank === 1) crown = `<img src="${SILVER_CROWN}" class="crown-icon">`;

    const timeStr = formatTime(r.timeSecs);
    const content = r.link ? `<a href="${r.link}" target="_blank" class="time-link ${p === 'jeremy' ? 'jeremy-time' : 'matt-time'}">${timeStr}</a>` : `<span class="${p === 'jeremy' ? 'jeremy-time' : 'matt-time'}">${timeStr}</span>`;

    lookup[`${p}|${mKey}|${r.weapon.toLowerCase()}`] = content + crown;
  });

  Object.keys(groupedByTier).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="${weaponOrder.length + 2}">${tier}</td></tr>`;
    groupedByTier[tier].forEach(m => {
      const mKey = m.toLowerCase();
      ['jeremy', 'matt'].forEach(p => {
        html += `<tr class="row-${p}">
          ${p === 'jeremy' ? `<td rowspan="2" class="monster-cell"><div class="cell-flex">${monsterIcons[mKey] ? `<img src="${monsterIcons[mKey]}" class="icon">` : ''}${m}</div></td>` : ''}
          <td class="player ${p} sub-row-player">${p.charAt(0).toUpperCase() + p.slice(1)}</td>`;
        weaponOrder.forEach(w => {
          const cellData = lookup[`${p}|${mKey}|${w.toLowerCase()}`];
          html += `<td class="time-cell">${cellData || '-'}</td>`;
        });
        html += `</tr>`;
      });
    });
  });
  document.getElementById('mainContent').innerHTML = html + `</tbody></table>`;
}

loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
