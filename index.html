<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: #e6edf3;
    }

    h1 {
      text-align: center;
      color: #ffb347;
      margin-top: 20px;
    }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin: 15px auto;
      max-width: 900px;
      width: 95%;
    }

    .score {
      background: #151b28;
      padding: 12px 20px;
      border-radius: 10px;
      text-align: center;
      flex: 1;
      max-width: 440px;
    }

    .score-jeremy { border-bottom: 3px solid #4ea1ff; color: #4ea1ff; }
    .score-matt { border-bottom: 3px solid #ffb347; color: #ffb347; }

    .score span {
      display: block;
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
      color: #e6edf3;
    }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      max-width: 900px;
      width: 95%;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: #151b28;
      border-radius: 8px;
      cursor: pointer;
      max-width: 445px;
    }

    .tab.active {
      color: #ffb347;
      font-weight: bold;
      background: #1c2333;
    }

    /* Table Foundations */
    table {
      width: 95%;
      max-width: 900px;
      margin: auto;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 8px 10px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Leaderboard Columns */
    .leaderboard-table th:nth-child(1), .leaderboard-table td:nth-child(1) { width: 220px; } 
    .leaderboard-table th:nth-child(2), .leaderboard-table td:nth-child(2) { width: 100px; } 
    .leaderboard-table th:nth-child(3), .leaderboard-table td:nth-child(3) { width: 160px; } 
    .leaderboard-table th:nth-child(4), .leaderboard-table td:nth-child(4) { width: 100px; text-align: right; }

    /* Weapon Grid Matrix */
    .weapon-grid { table-layout: auto; width: 95%; max-width: 1200px; }
    .weapon-header-cell { text-align: center; padding: 10px 4px; width: 45px; }
    .weapon-header-cell img { display: block; margin: 0 auto; width: 24px; height: 24px; cursor: help; }
    .weapon-header-cell span { display: none; } 

    .monster-cell { vertical-align: middle; font-weight: bold; background: rgba(255, 255, 255, 0.02); border-right: 1px solid #1c2333; }
    .sub-row-player { font-size: 0.8rem; height: 30px; font-weight: 600; width: 80px; }
    .time-cell { text-align: center; font-family: monospace; border-left: 1px solid #1c2333; font-size: 0.8rem; }

    th { border-bottom: 1px solid #2a3242; color: #9fb3c8; font-size: 0.85rem; text-transform: uppercase; }
    tr { border-bottom: 1px solid #1c2333; }

    .tier-row td {
      padding-top: 20px;
      font-weight: bold;
      color: #ffb347;
      border-bottom: 1px solid #2a3242;
      background: rgba(255, 179, 71, 0.05);
    }

    .cell-flex { display: flex; align-items: center; gap: 8px; }
    .icon { width: 24px; height: 24px; object-fit: contain; }
    .icon.weapon { width: 20px; height: 20px; opacity: 0.9; }

    .player.jeremy { color: #4ea1ff; }
    .player.matt { color: #ffb347; }
    tr.row-jeremy { border-left: 3px solid #4ea1ff; }
    tr.row-matt { border-left: 3px solid #ffb347; }

    .time { font-family: monospace; font-weight: 600; color: #ffb347; }
    #lastUpdated { text-align: center; margin: 30px auto; color: #7f8ca3; font-size: 0.8rem; }
  </style>
</head>

<body>

<h1>TA Leaderboard</h1>

<div class="scoreboard">
  <div class="score score-jeremy">Jeremy <span id="jeremyCount">0</span></div>
  <div class="score score-matt">Matt <span id="mattCount">0</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('weapons', this)">Weapon Times</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<script>
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

let allRuns = [];
let bestRuns = [];
let monsterIcons = {};
let monsterTiers = {};
let weaponIcons = {};
let currentView = 'leaderboard';

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (char === '"') {
      if (inQuotes && text[i + 1] === '"') { current += '"'; i++; } 
      else inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) { row.push(current); current = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) { row.push(current); rows.push(row); row = []; current = ''; }
    } else current += char;
  }
  if (current || row.length) { row.push(current); rows.push(row); }
  return rows;
}

function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf') || s === "" || s.includes('n/a')) return null;

  const m = s.match(/^(\d+):(\d+)(\.\d+)?/);
  if (!m) return null;

  const mins = parseInt(m[1]);
  const secs = parseInt(m[2]);
  const ms = m[3] ? parseFloat(m[3]) : 0;

  if (mins >= 59) return null; // Filter DNF/Invalid 59:00 runs

  return (mins * 60) + secs + ms;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  const ms = (secs % 1).toFixed(2).substring(1);
  return `${m}:${s.toString().padStart(2, '0')}${ms === '.00' ? '' : ms}`;
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = "Syncing...";
  try {
    const ts = Date.now();
    const [runsRes, mRes, wRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes), mRows = parseCSV(mRes), wRows = parseCSV(wRes);

    monsterIcons = {}; monsterTiers = {};
    mRows.slice(1).forEach(r => {
      if (r[1]) {
        const key = r[1].trim().toLowerCase();
        monsterTiers[key] = r[0];
        monsterIcons[key] = r[3];
      }
    });

    weaponIcons = {};
    wRows.slice(1).forEach(r => { if (r[0] && r[2]) weaponIcons[r[0].trim().toLowerCase()] = r[2]; });

    const headers = runRows[0].map(h => h.toLowerCase());
    const cP = headers.indexOf('player'), cM = headers.indexOf('monster'), cT = headers.indexOf('time') !== -1 ? headers.indexOf('time') : headers.indexOf('best time'), cW = headers.indexOf('weapon');

    const weaponBestMap = {};
    runRows.slice(1).forEach(r => {
      const time = parseTime(r[cT]);
      const weapon = r[cW] ? r[cW].trim() : "";
      const monster = r[cM] ? r[cM].trim() : "";
      const player = r[cP] ? r[cP].trim() : "";
      
      if (player && monster !== "" && weapon !== "" && time !== null) {
        const key = `${player}-${monster}-${weapon}`.toLowerCase();
        if (!weaponBestMap[key] || time < weaponBestMap[key].bestTime) {
          weaponBestMap[key] = { player, monster, weapon, bestTime: time, variant: r[headers.indexOf('variant')] || 'Base' };
        }
      }
    });

    allRuns = Object.values(weaponBestMap);
    buildBestRuns();
    currentView === 'leaderboard' ? renderLeaderboard() : renderWeaponTimes();
    document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) { console.error(e); document.getElementById('lastUpdated').textContent = "Sync failed"; }
}

function buildBestRuns() {
  const map = {};
  allRuns.forEach(run => {
    const key = `${run.variant}-${run.monster}`.toLowerCase();
    if (!map[key] || run.bestTime < map[key].bestTime) map[key] = run;
  });
  bestRuns = Object.values(map).sort((a, b) => a.bestTime - b.bestTime);
}

function switchTab(view, el) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  view === 'leaderboard' ? renderLeaderboard() : renderWeaponTimes();
}

function renderLeaderboard() {
  let jW = 0, mW = 0;
  bestRuns.forEach(r => { 
    if (r.player.toLowerCase().includes('jeremy')) jW++; 
    else if (r.player.toLowerCase().includes('matt')) mW++; 
  });
  document.getElementById('jeremyCount').textContent = jW;
  document.getElementById('mattCount').textContent = mW;

  const grouped = {};
  bestRuns.forEach(r => {
    const tier = monsterTiers[r.monster.trim().toLowerCase()] || 'Unknown';
    if (!grouped[tier]) grouped[tier] = [];
    grouped[tier].push(r);
  });

  let html = `<table class="leaderboard-table"><thead><tr><th>Monster</th><th>Player</th><th>Weapon</th><th style="text-align:right">Time</th></tr></thead><tbody>`;
  Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="4">${tier}</td></tr>`;
    grouped[tier].forEach(r => {
      const pCls = r.player.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';
      const mKey = r.monster.toLowerCase();
      const wKey = r.weapon.toLowerCase();
      html += `<tr class="row-${pCls}">
        <td><div class="cell-flex">${monsterIcons[mKey] ? `<img src="${monsterIcons[mKey]}" class="icon">` : ''}${r.monster}</div></td>
        <td class="player ${pCls}">${r.player}</td>
        <td><div class="cell-flex">${weaponIcons[wKey] ? `<img src="${weaponIcons[wKey]}" class="icon weapon">` : ''}${r.weapon}</div></td>
        <td class="time" style="text-align:right">${formatTime(r.bestTime)}</td>
      </tr>`;
    });
  });
  document.getElementById('mainContent').innerHTML = html + '</tbody></table>';
}

function renderWeaponTimes() {
  const weapons = [...new Set(allRuns.map(r => r.weapon))].sort();
  const monsters = [...new Set(bestRuns.map(r => r.monster))];
  
  const groupedByTier = {};
  monsters.forEach(mName => {
    const tier = monsterTiers[mName.toLowerCase()] || 'Unknown';
    if (!groupedByTier[tier]) groupedByTier[tier] = [];
    groupedByTier[tier].push(mName);
  });

  const sortedTiers = Object.keys(groupedByTier).sort((a, b) => b.localeCompare(a));

  let html = `<table class="weapon-grid"><thead><tr><th style="width:200px">Monster</th>`;
  weapons.forEach(w => {
    const icon = weaponIcons[w.toLowerCase()];
    html += `<th class="weapon-header-cell">${icon ? `<img src="${icon}" class="icon" title="${w}">` : ''}<span>${w}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  sortedTiers.forEach(tier => {
    html += `<tr class="tier-row"><td colspan="${weapons.length + 1}">${tier}</td></tr>`;
    groupedByTier[tier].forEach(mName => {
      const mKey = mName.toLowerCase();
      
      // Jeremy Row
      html += `<tr><td rowspan="2" class="monster-cell"><div class="cell-flex">${monsterIcons[mKey] ? `<img src="${monsterIcons[mKey]}" class="icon">` : ''}${mName}</div></td>
      <td class="player jeremy sub-row-player" style="border-left:3px solid #4ea1ff">Jeremy</td>`;
      weapons.forEach(w => {
        const run = allRuns.find(r => r.monster === mName && r.weapon === w && r.player.toLowerCase().includes('jeremy'));
        html += `<td class="time-cell">${run ? formatTime(run.bestTime) : '-'}</td>`;
      });
      html += `</tr>`;

      // Matt Row
      html += `<tr><td class="player matt sub-row-player" style="border-left:3px solid #ffb347">Matt</td>`;
      weapons.forEach(w => {
        const run = allRuns.find(r => r.monster === mName && r.weapon === w && r.player.toLowerCase().includes('matt'));
        html += `<td class="time-cell">${run ? formatTime(run.bestTime) : '-'}</td>`;
      });
      html += `</tr>`;
    });
  });

  document.getElementById('mainContent').innerHTML = html + `</tbody></table>`;
}

loadData();
setInterval(loadData, 120000);
</script>

</body>
</html>
