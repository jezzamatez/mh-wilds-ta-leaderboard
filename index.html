<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter Leaderboard</title>
  <style>
    :root[data-theme="dark"] {
      --bg-image: url('https://pbs.twimg.com/media/GYR0g-xXMAAYZYq?format=jpg&name=4096x4096');
      --overlay-bg: rgba(11, 15, 23, 0.85);
      --overlay-bg-light: rgba(21, 27, 40, 0.6);
      --overlay-bg-mid: rgba(28, 35, 51, 0.8);
      --text-primary: #e6edf3;
      --text-secondary: #7f8ca3;
      --text-muted: #cbd5e0;
      --border-color: #2a3242;
      --border-subtle: rgba(255, 255, 255, 0.1);
      --tier-row-bg: rgba(255, 179, 71, 0.1);
      --monster-cell-bg: rgba(255, 255, 255, 0.05);
      --table-header-bg: transparent;
      --input-bg: rgba(21, 27, 40, 0.9);
      --shadow: 2px 2px 4px rgba(0,0,0,0.9);
    }
    :root[data-theme="light"] {
      --bg-image: none;
      --overlay-bg: rgba(245, 247, 250, 0.97);
      --overlay-bg-light: rgba(230, 235, 245, 0.9);
      --overlay-bg-mid: rgba(220, 228, 240, 0.95);
      --text-primary: #1a2030;
      --text-secondary: #4a5568;
      --text-muted: #5a6478;
      --border-color: #c8d0e0;
      --border-subtle: rgba(0, 0, 0, 0.1);
      --tier-row-bg: rgba(200, 140, 40, 0.12);
      --monster-cell-bg: rgba(0, 0, 0, 0.04);
      --table-header-bg: rgba(210, 220, 235, 0.8);
      --input-bg: rgba(230, 235, 245, 0.95);
      --shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: var(--bg-image);
      background-color: #d8dfe8;
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      color: var(--text-primary);
      transition: background-color 0.3s, color 0.3s;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding-top: 20px;
      margin-bottom: 0;
    }

    h1 {
      text-align: center;
      color: #ffb347;
      margin: 0;
      text-shadow: var(--shadow);
    }

    .theme-toggle {
      position: absolute;
      right: 20px;
      background: var(--overlay-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px 12px;
      transition: 0.2s;
      backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { border-color: #ffb347; }

    /* ── New run badge ── */
    #newRunBadge {
      display: none;
      margin: 10px auto 0 auto;
      max-width: 400px;
      text-align: center;
      background: linear-gradient(135deg, #4ea1ff22, #ffb34722);
      border: 1px solid #ffb347;
      border-radius: 20px;
      padding: 7px 18px;
      color: #ffb347;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      animation: badge-pulse 2s infinite alternate;
    }
    @keyframes badge-pulse {
      from { box-shadow: 0 0 4px rgba(255,179,71,0.3); }
      to   { box-shadow: 0 0 12px rgba(255,179,71,0.7); }
    }

    /* ── Filter bar ── */
    .filter-bar { display: flex; justify-content: center; gap: 10px; margin: 12px 0 0 0; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; background: var(--overlay-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; transition: 0.2s; backdrop-filter: blur(8px); }
    .filter-btn.active { background: #ffb347; color: #0b0f17; border-color: #ffb347; font-weight: bold; }

    /* ── Monster type filter + search ── */
    .monster-filter-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 10px auto 0 auto;
      max-width: 900px;
      width: 95%;
      flex-wrap: wrap;
    }
    .type-btn {
      padding: 5px 13px;
      background: var(--overlay-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.82rem;
      transition: 0.2s;
      backdrop-filter: blur(8px);
    }
    .type-btn.active { background: #4ea1ff; color: #0b0f17; border-color: #4ea1ff; font-weight: bold; }
    .type-btn.tempered.active   { background: #a349ff; border-color: #a349ff; color: #fff; }
    .type-btn.frenzied.active   { background: #ff4e6a; border-color: #ff4e6a; color: #fff; }
    .type-btn.arch-tempered.active { background: #ff6a00; border-color: #ff6a00; color: #fff; }

    #monsterSearch {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 0.82rem;
      outline: none;
      backdrop-filter: blur(8px);
      width: 160px;
      transition: border-color 0.2s;
    }
    #monsterSearch:focus { border-color: #ffb347; }
    #monsterSearch::placeholder { color: var(--text-secondary); }

    /* ── Shared container styles ── */
    .scoreboard, .tabs, .table-container, .weapon-grid, .rivalry-grid {
      background: var(--overlay-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
    }

    .scoreboard { display: flex; justify-content: center; gap: 20px; margin: 12px auto; max-width: 900px; width: 95%; padding: 10px; }
    .score { background: var(--overlay-bg-light); padding: 12px 20px; border-radius: 10px; text-align: center; flex: 1; max-width: 440px; }
    .score-jeremy { border-bottom: 3px solid #4ea1ff; color: #4ea1ff; }
    .score-matt { border-bottom: 3px solid #ffb347; color: #ffb347; }
    .score span { display: block; font-size: 28px; font-weight: bold; margin-top: 8px; color: var(--text-primary); }

    .tabs { display: flex; justify-content: center; gap: 10px; margin: 12px auto; max-width: 900px; width: 95%; padding: 5px; }
    .tab { flex: 1; padding: 12px; text-align: center; background: var(--overlay-bg-light); border-radius: 8px; cursor: pointer; }
    .tab.active { color: #ffb347; font-weight: bold; background: var(--overlay-bg-mid); }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .table-container { max-width: 1100px; margin: auto; padding: 15px; width: 95%; overflow-x: auto; }
    th { background: var(--table-header-bg); color: var(--text-secondary); font-size: 0.85rem; }
    th, td { padding: 8px 4px; text-align: left; white-space: nowrap; }

    .weapon-grid { max-width: 1400px; margin: 0 auto 50px auto; padding: 15px; width: 98%; }
    .weapon-header-cell { text-align: center; padding: 4px; width: 52px; border-bottom: 1px solid var(--border-color); }
    .weapon-header-cell img { display: block; margin: 0 auto; width: 22px; height: 22px; }

    .monster-cell { vertical-align: middle; font-weight: bold; background: var(--monster-cell-bg); border-right: 1px solid var(--border-color); width: 180px; }
    .sub-row-player { font-size: 0.75rem; height: 50px; font-weight: 600; width: 60px; text-align: center; border-right: 1px solid var(--border-color); vertical-align: middle; }

    .time-cell { text-align: center; font-family: 'Courier New', monospace; border-left: 1px solid var(--border-color); font-size: 0.7rem; color: var(--text-muted); padding: 4px 1px; vertical-align: middle; }

    .cell-stack { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40px; gap: 4px; }
    .time-medal-row { display: flex; align-items: center; justify-content: center; gap: 5px; height: 22px; }

    .leaderboard-time-wrapper { display: inline-flex; align-items: center; justify-content: flex-end; gap: 6px; min-width: 80px; }
    .time-val { font-weight: bold; }

    .time-link { text-decoration: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: filter 0.2s; }
    .time-link:hover { filter: brightness(1.4); }

    .play-button-spacer { width: 14px; height: 10px; display: inline-block; }
    .play-svg-container { display: flex; align-items: center; justify-content: center; width: 14px; height: 10px; background-color: #FF0000; border-radius: 2px; }
    .play-svg { width: 7px; height: 7px; fill: white; }

    .jeremy-time { color: #4ea1ff !important; }
    .matt-time { color: #ffb347 !important; }

    .tier-row td { padding: 15px 10px 5px 10px; font-weight: bold; color: #ffb347; background: var(--tier-row-bg); border-bottom: 1px solid var(--border-color); }
    .cell-flex { display: flex; align-items: center; gap: 8px; }

    .icon { width: 34px; height: 34px; object-fit: contain; transition: transform 0.2s ease; flex-shrink: 0; }

    .weapon-grid tr.row-jeremy:hover .icon,
    .weapon-grid tr.row-matt:hover .icon,
    .weapon-grid tr.row-jeremy:hover + tr.row-matt .icon,
    .weapon-grid tr:has(+ tr.row-matt:hover) .icon { transform: scale(1.25); }

    .tempered-glow { filter: drop-shadow(0 0 5px rgba(163, 73, 255, 0.6)); }

    .crown-icon { width: 22px; height: 22px; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .gold-crown { filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.8)); animation: crown-glow 3s infinite alternate; }
    .silver-crown { filter: drop-shadow(0 0 3px rgba(192, 192, 192, 0.6)); }

    @keyframes crown-glow {
      from { filter: drop-shadow(0 0 2px rgba(255, 215, 0, 0.4)); }
      to   { filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.9)); }
    }

    tr:hover .crown-icon { transform: scale(1.4) rotate(-5deg); }

    .player.jeremy { color: #4ea1ff; }
    .player.matt { color: #ffb347; }
    tr.row-jeremy { border-left: 3px solid #4ea1ff; }
    tr.row-matt { border-left: 3px solid #ffb347; }

    /* ── Rivalry tab ── */
    .rivalry-grid { max-width: 1100px; margin: 0 auto 50px auto; padding: 15px; width: 95%; }
    .rivalry-grid table { table-layout: auto; }
    .rivalry-card { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 8px; }
    .rivalry-player-block { display: flex; flex-direction: column; align-items: center; width: 120px; }
    .rivalry-time { font-family: 'Courier New', monospace; font-size: 1rem; font-weight: bold; }
    .rivalry-winner-badge { font-size: 0.7rem; font-weight: bold; margin-top: 2px; padding: 2px 8px; border-radius: 10px; }
    .rivalry-winner-badge.jeremy { background: #4ea1ff33; color: #4ea1ff; border: 1px solid #4ea1ff55; }
    .rivalry-winner-badge.matt   { background: #ffb34733; color: #ffb347; border: 1px solid #ffb34755; }
    .rivalry-gap { font-size: 0.75rem; color: var(--text-muted); text-align: center; width: 70px; flex-shrink: 0; }
    .rivalry-vs { font-size: 0.8rem; font-weight: bold; color: var(--text-secondary); }
    .rivalry-monster-col { display: flex; align-items: center; gap: 8px; }
    .rivalry-weapon-col { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .rivalry-weapon-col img { width: 18px; height: 18px; }
    .rivalry-close { color: #ff4e6a; font-size: 0.7rem; font-weight: bold; margin-left: 4px; }

    #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #videoContainer { position: relative; width: 80%; max-width: 900px; aspect-ratio: 16/9; background: #000; }
    #closeVideo { position: absolute; top: -40px; right: 0; color: white; font-size: 24px; cursor: pointer; font-weight: bold; }

    #lastUpdated { text-align: center; margin: 30px auto; color: var(--text-muted); font-size: 0.8rem; text-shadow: 1px 1px 2px black; }

    .no-results { text-align: center; padding: 40px; color: var(--text-secondary); font-style: italic; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>Hunter Leaderboard</h1>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
</div>

<div id="newRunBadge" onclick="dismissBadge()"></div>

<div class="filter-bar">
  <div id="btnTA" class="filter-btn active" onclick="setRunFilter('TA')">TA Rules</div>
  <div id="btnFreestyle" class="filter-btn" onclick="setRunFilter('Freestyle')">Freestyle</div>
</div>

<div class="monster-filter-bar">
  <button class="type-btn active" data-type="all" onclick="setTypeFilter('all', this)">All</button>
  <button class="type-btn" data-type="regular" onclick="setTypeFilter('regular', this)">Regular</button>
  <button class="type-btn tempered" data-type="tempered" onclick="setTypeFilter('tempered', this)">Tempered</button>
  <button class="type-btn frenzied" data-type="frenzied" onclick="setTypeFilter('frenzied', this)">Frenzied</button>
  <button class="type-btn arch-tempered" data-type="arch-tempered" onclick="setTypeFilter('arch-tempered', this)">Arch-Tempered</button>
  <input id="monsterSearch" type="text" placeholder="🔍 Search monster..." oninput="render()">
</div>

<div class="scoreboard">
  <div class="score score-jeremy">Jeremy <span id="jeremyCount">0</span></div>
  <div class="score score-matt">Matt <span id="mattCount">0</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('weapons', this)">Weapon Times</div>
  <div class="tab" onclick="switchTab('rivalry', this)">⚔️ Rivalry</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<div id="videoOverlay" onclick="closeVideo()">
  <div id="videoContainer" onclick="event.stopPropagation()">
    <span id="closeVideo" onclick="closeVideo()">&times; Close</span>
    <iframe id="videoFrame" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
const SHEET_ID   = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const GID_RUNS     = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS  = '2020437619';

const GOLD_CROWN   = "https://www.phantombrawlers.com/static/mhwilds/Icons/King%20Crown.png";
const SILVER_CROWN = "https://www.phantombrawlers.com/static/mhwilds/Icons/Big%20Crown.png";
const PLAY_BUTTON_HTML = `<div class="play-svg-container"><svg class="play-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`;

// ── STATE ────────────────────────────────────────
let state = {
  view: 'leaderboard',
  runFilter: 'TA',
  typeFilter: 'all'
};

let allRunsRaw = [];
let monsterIcons = {};
let monsterTiers = {};
let weaponIcons = {};
let weaponOrder = [];
let previousRunIds = null;

// ── HELPERS ──────────────────────────────────────
const clean = s => s ? s.toString().trim() : '';

function getPlayerKey(name) {
  return name.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';
}

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', inQuotes = false;
  for (let char of text) {
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) { row.push(current); current = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) { row.push(current); rows.push(row); row = []; current = ''; }
    } else current += char;
  }
  if (current || row.length) { row.push(current); rows.push(row); }
  return rows;
}

function parseTime(val) {
  if (!val) return null;
  const s = val.toLowerCase().trim();
  if (s.includes('dnf') || s === "" || s.includes('n/a')) return null;
  const m = s.match(/^(\d+):(\d+)(\.\d+)?/);
  if (!m) return null;
  const mins = parseInt(m[1]), secs = parseInt(m[2]), ms = m[3] ? parseFloat(m[3]) : 0;
  return mins >= 59 ? null : (mins * 60) + secs + ms;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60), s = Math.floor(secs % 60), ms = (secs % 1).toFixed(2).substring(1);
  return `${m}:${s.toString().padStart(2, '0')}${ms === '.00' ? '' : ms}`;
}

// ── RENDER HELPERS ───────────────────────────────
function renderMonsterCell(name) {
  const key = name.toLowerCase();
  const isTempered = key.includes('tempered');
  return `<div class="cell-flex">
    ${monsterIcons[key] ? `<img src="${monsterIcons[key]}" class="icon ${isTempered ? 'tempered-glow' : ''}">` : ''}
    ${name}
  </div>`;
}

function renderWeaponCell(name) {
  const key = name.toLowerCase();
  return `<div class="cell-flex">
    ${weaponIcons[key] ? `<img src="${weaponIcons[key]}" class="icon" style="width:18px;height:18px">` : ''}
    ${name}
  </div>`;
}

function renderTimeCell(r, p) {
  const playBtn = r.link
    ? `<span onclick="openVideo('${r.link}')" class="time-link">${PLAY_BUTTON_HTML}</span>`
    : `<span class="play-button-spacer"></span>`;

  return `<div class="leaderboard-time-wrapper">
    <span class="${p}-time time-val">${formatTime(r.timeSecs)}</span>
    ${playBtn}
  </div>`;
}

// ── FILTERS ──────────────────────────────────────
function setRunFilter(type) {
  state.runFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn${type}`).classList.add('active');
  render();
}

function setTypeFilter(type, el) {
  state.typeFilter = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function switchTab(view, el) {
  state.view = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── DATA LOADING ─────────────────────────────────
async function loadData() {
  const statusEl = document.getElementById('lastUpdated');
  statusEl.textContent = "Syncing...";

  try {
    const ts = Date.now();

    const [runsRes, mRes, wRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes);
    const mRows   = parseCSV(mRes);
    const wRows   = parseCSV(wRes);

    monsterIcons = {}; 
    monsterTiers = {};

    mRows.slice(1).forEach(r => {
      const name = clean(r[1]).toLowerCase();
      monsterTiers[name] = clean(r[0]);
      monsterIcons[name] = clean(r[3]);
    });

    weaponIcons = {}; 
    weaponOrder = [];

    wRows.slice(1).forEach(r => {
      const w = clean(r[0]);
      weaponOrder.push(w);
      weaponIcons[w.toLowerCase()] = clean(r[2]);
    });

    const headers = runRows[0].map(h => h.toLowerCase().trim());

    const cP = headers.indexOf('player'),
          cR = headers.indexOf('run'),
          cM = headers.indexOf('monster'),
          cW = headers.indexOf('weapon'),
          cT = headers.indexOf('duration'),
          cV = headers.indexOf('link');

    const freshRuns = runRows.slice(1).map(r => ({
      player: clean(r[cP]),
      runType: clean(r[cR]),
      monster: clean(r[cM]),
      weapon: clean(r[cW]),
      timeSecs: parseTime(clean(r[cT])),
      link: clean(r[cV])
    })).filter(r => r.timeSecs !== null);

    allRunsRaw = freshRuns;

    render();

    statusEl.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    console.error("LOAD ERROR:", e);
    statusEl.textContent = "Sync failed — retrying...";
  }
}

// ── CORE RENDER ──────────────────────────────────
function render() {
  let filtered = allRunsRaw.filter(r => r.runType === state.runFilter);

  const bestMap = new Map();
  filtered.forEach(r => {
    const key = `${getPlayerKey(r.player)}|${r.monster}|${r.weapon}`;
    if (!bestMap.has(key) || r.timeSecs < bestMap.get(key).timeSecs)
      bestMap.set(key, r);
  });

  filtered = Array.from(bestMap.values());

  if (state.view === 'leaderboard') renderLeaderboard(filtered);
  else if (state.view === 'weapons') renderWeapons(filtered);
  else renderRivalry(filtered);
}

// ── LEADERBOARD (FULLY RESTORED) ─────────────────
function renderLeaderboard(filtered) {
  const monsterStats = {};
  filtered.forEach(r => {
    const key = r.monster.toLowerCase();
    if (!monsterStats[key]) monsterStats[key] = [];
    monsterStats[key].push(r);
  });

  for (let m in monsterStats)
    monsterStats[m].sort((a,b)=>a.timeSecs-b.timeSecs);

  const best = Object.values(monsterStats).map(arr => arr[0]);

  const grouped = {};
  best.forEach(r => {
    const tier = monsterTiers[r.monster.toLowerCase()] || 'Other';
    if (!grouped[tier]) grouped[tier] = [];
    grouped[tier].push(r);
  });

  let html = `<div class="table-container"><table><thead><tr>
    <th style="width:200px">Monster</th>
    <th>Player</th>
    <th>Weapon</th>
    <th style="text-align:right">Time</th>
  </tr></thead><tbody>`;

  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(tier=>{
    html += `<tr class="tier-row"><td colspan="4">${tier}</td></tr>`;
    grouped[tier].forEach(r=>{
      const p = getPlayerKey(r.player);
      html += `<tr class="row-${p}">
        <td>${renderMonsterCell(r.monster)}</td>
        <td class="player ${p}">${r.player}</td>
        <td>${renderWeaponCell(r.weapon)}</td>
        <td style="text-align:right">${renderTimeCell(r,p)}</td>
      </tr>`;
    });
  });
