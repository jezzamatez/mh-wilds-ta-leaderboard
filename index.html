<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Wilds — Time Attack Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0f14;
  --surface: #161a22;
  --surface2: #1e2330;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #e8a020;
  --accent2: #c06010;
  --jeremy: #3b82f6;
  --matt: #10b981;
  --text: #f0ede8;
  --muted: #7a8090;
  --danger: #e05050;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

.container { max-width: 1000px; margin: auto; padding: 20px; }

h1 {
  font-family: 'Rajdhani';
  text-align: center;
  color: var(--accent);
  margin-bottom: 20px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: var(--surface);
  text-align: center;
  cursor: pointer;
  border-radius: 8px;
}

.tab.active {
  background: var(--surface2);
  color: var(--accent);
}

.board-wrap {
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.monster-name {
  font-family: 'Rajdhani';
}

.player-pill {
  padding: 4px 10px;
  border-radius: 20px;
}

.pp-jeremy { color: var(--jeremy); }
.pp-matt { color: var(--matt); }

.sync-status {
  text-align: center;
  margin-top: 20px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>TA Leaderboard</h1>

<div class="stats-bar">
  <div class="stat-card">
    <div id="jeremyCount">0</div>
    <div>Jeremy</div>
  </div>
  <div class="stat-card">
    <div id="mattCount">0</div>
    <div>Matt</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('h2h', this)">H2H</div>
</div>

<div id="mainContent">Loading...</div>

<div class="sync-status" id="lastUpdated">Connecting...</div>

</div>

<script>
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';

let allRuns = [];
let currentTab = 'leaderboard';

function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let char of text) {
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if (char === '\n' && !inQuotes) {
      row.push(current);
      rows.push(row);
      row = [];
      current = '';
    } else current += char;
  }
  return rows;
}

function parseTime(t) {
  if (!t) return null;
  const m = t.match(/(\d+):(\d+)/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

async function loadData() {
  const res = await fetch(`${BASE}&gid=${GID_RUNS}`);
  const text = await res.text();
  const rows = parseCSV(text);

  const headers = rows[0].map(h => h.trim().toLowerCase());
  const col = name => headers.indexOf(name);

  allRuns = [];

  rows.slice(1).forEach(r => {
    if (!r[col('player')]) return;

    allRuns.push({
      player: r[col('player')],
      monster: r[col('monster')],
      time: parseTime(r[col('time')])
    });
  });

  render();
}

function render() {
  let html = '<table>';

  allRuns.forEach(r => {
    html += `<tr>
      <td>${r.monster}</td>
      <td>${r.player}</td>
      <td>${r.time || 'DNF'}</td>
    </tr>`;
  });

  html += '</table>';
  document.getElementById('mainContent').innerHTML = html;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  render();
}

loadData();
</script>

</body>
</html>
