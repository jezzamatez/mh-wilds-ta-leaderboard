<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Wilds — Time Attack Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0f14;
  --surface: #161a22;
  --surface2: #1e2330;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #e8a020;
  --accent2: #c06010;
  --jeremy: #3b82f6;
  --matt: #10b981;
  --text: #f0ede8;
  --muted: #7a8090;
  --danger: #e05050;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

.container { max-width: 1000px; margin: auto; padding: 20px; }

h1 {
  font-family: 'Rajdhani';
  text-align: center;
  color: var(--accent);
  margin-bottom: 20px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: var(--surface);
  text-align: center;
  cursor: pointer;
  border-radius: 8px;
}

.tab.active {
  background: var(--surface2);
  color: var(--accent);
}

.board-wrap {
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.monster-name {
  font-family: 'Rajdhani';
}

.player-pill {
  padding: 4px 10px;
  border-radius: 20px;
}

.pp-jeremy { color: var(--jeremy); }
.pp-matt { color: var(--matt); }

.sync-status {
  text-align: center;
  margin-top: 20px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>TA Leaderboard</h1>

<div class="stats-bar">
  <div class="stat-card">
    <div id="jeremyCount">0</div>
    <div>Jeremy</div>
  </div>
  <div class="stat-card">
    <div id="mattCount">0</div>
    <div>Matt</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('h2h', this)">H2H</div>
</div>

<div id="mainContent">Loading...</div>

<div class="sync-status" id="lastUpdated">Connecting...</div>

</div>

<script>
// --- CONFIG ---
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';   // monsterinfo
const GID_WEAPONS = '2020437619';  // weaponinfo

let allRuns = [];
let bestRuns = [];

let monsterIcons = {};
let weaponIcons = {};

// --- CSV PARSER ---
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      if (inQuotes && text[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) {
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      }
    } else {
      current += char;
    }
  }

  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }

  return rows;
}

// --- TIME ---
function parseTime(val) {
  if (!val) return null;

  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf')) return null;

  const m = s.match(/^(\d+):(\d+)/);
  if (!m) return null;

  const minutes = parseInt(m[1]);
  const seconds = parseInt(m[2]);

  if (minutes >= 59) return null;

  return minutes * 60 + seconds;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// --- LOAD DATA ---
async function loadData() {
  const status = document.getElementById('lastUpdated');
  status.textContent = "Syncing...";

  try {
    const [runsRes, monsterRes, weaponRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes);
    const monsterRows = parseCSV(monsterRes);
    const weaponRows = parseCSV(weaponRes);

    // --- BUILD ICON MAPS ---
    monsterIcons = {};
    monsterRows.slice(1).forEach(r => {
      if (r[0] && r[1]) {
        monsterIcons[r[0].trim()] = r[1];
      }
    });

    weaponIcons = {};
    weaponRows.slice(1).forEach(r => {
      if (r[0] && r[1]) {
        weaponIcons[r[0].trim()] = r[1];
      }
    });

    // --- MAP RUN DATA ---
    const headers = runRows[0].map(h => h.trim().toLowerCase());
    const col = name => headers.indexOf(name);

    const colPlayer = col('player');
    const colMonster = col('monster');
    const colVariant = col('variant');
    const colTime = col('time') !== -1 ? col('time') : col('best time');
    const colWeapon = col('weapon');

    allRuns = [];

    runRows.slice(1).forEach(r => {
      if (!r[colPlayer]) return;

      const time = parseTime(r[colTime]);
      if (time === null) return;

      allRuns.push({
        player: r[colPlayer],
        monster: r[colMonster],
        variant: r[colVariant] || 'Base',
        weapon: r[colWeapon] || '',
        bestTime: time
      });
    });

    buildBestRuns();
    renderLeaderboard();

    status.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    console.error(e);
    document.getElementById('mainContent').innerHTML = "Failed to load data";
    status.textContent = "Sync failed";
  }
}

// --- BEST RUN PER MONSTER ---
function buildBestRuns() {
  const map = {};

  allRuns.forEach(run => {
    const key = `${run.variant}-${run.monster}`.toLowerCase();

    if (!map[key] || run.bestTime < map[key].bestTime) {
      map[key] = run;
    }
  });

  bestRuns = Object.values(map).sort((a, b) => a.bestTime - b.bestTime);
}

// --- RENDER ---
function renderLeaderboard() {
  let jeremyWins = 0;
  let mattWins = 0;

  bestRuns.forEach(r => {
    if (r.player.toLowerCase().includes('jeremy')) jeremyWins++;
    if (r.player.toLowerCase().includes('matt')) mattWins++;
  });

  document.getElementById('jeremyCount').textContent = jeremyWins;
  document.getElementById('mattCount').textContent = mattWins;

  let html = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Monster</th>
          <th>Player</th>
          <th>Weapon</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
  `;

  bestRuns.forEach((r, i) => {
    const mIcon = monsterIcons[r.monster] || '';
    const wIcon = weaponIcons[r.weapon] || '';

    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${mIcon} ${r.monster}</td>
        <td>${r.player}</td>
        <td>${wIcon} ${r.weapon}</td>
        <td>${formatTime(r.bestTime)}</td>
      </tr>
    `;
  });

  html += '</tbody></table>';

  document.getElementById('mainContent').innerHTML = html;
}

// --- INIT ---
loadData();
setInterval(loadData, 120000);
</script>

</body>
</html>
