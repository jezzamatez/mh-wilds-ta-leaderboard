<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunter Leaderboard</title>
  <style>
    /* 1. CORE THEME & BACKGROUND */
    body { 
      margin: 0; 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: #05070a; /* Deep navy/black for better contrast */
      color: #e6edf3; 
    }
    h1 { 
      text-align: center; 
      color: #ffb347; 
      margin-top: 25px; 
      text-transform: uppercase; 
      letter-spacing: 3px;
      text-shadow: 0 0 15px rgba(255, 179, 71, 0.2);
    }

    /* 2. FILTERS & TABS */
    .filter-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .filter-btn { 
      padding: 10px 24px; 
      background: #1a202c; 
      border: 1px solid #2d3748; 
      border-radius: 4px; 
      color: #a0aec0; 
      cursor: pointer; 
      transition: 0.3s; 
      font-weight: 600; 
    }
    .filter-btn.active { 
      background: linear-gradient(135deg, #ffb347 0%, #ff8c00 100%); 
      color: #000; 
      border-color: transparent; 
      box-shadow: 0 0 20px rgba(255, 179, 71, 0.3); 
    }

    .scoreboard { display: flex; justify-content: center; gap: 25px; margin: 20px auto; max-width: 900px; width: 95%; }
    .score { 
      background: rgba(26, 32, 44, 0.6); 
      backdrop-filter: blur(8px); 
      padding: 18px; 
      border-radius: 12px; 
      text-align: center; 
      flex: 1; 
      border: 1px solid rgba(255,255,255,0.05); 
    }
    .score-jeremy { border-top: 4px solid #4ea1ff; color: #4ea1ff; }
    .score-matt { border-top: 4px solid #ffb347; color: #ffb347; }
    .score span { display: block; font-size: 38px; font-weight: 900; margin-top: 5px; color: #fff; }

    .tabs { display: flex; justify-content: center; margin: 25px auto; max-width: 900px; border-radius: 8px; overflow: hidden; border: 1px solid #2d3748; }
    .tab { flex: 1; padding: 15px; text-align: center; background: #0f141d; cursor: pointer; transition: 0.2s; color: #718096; }
    .tab.active { background: #1a202c; color: #ffb347; font-weight: bold; }

    /* 3. MONSTER ICONS & TEMPERED GLOW */
    .icon { 
      width: 36px; /* Increased size */
      height: 36px; 
      object-fit: contain; 
      transition: transform 0.2s ease; 
    }
    tr:hover .icon { transform: scale(1.2); }
    
    /* The purple glow for Tempered monsters */
    .tempered-glow { 
      filter: drop-shadow(0 0 4px #a349ff) drop-shadow(0 0 8px #7000ff); 
    }

    /* 4. TABLES & DATA */
    table { width: 95%; max-width: 1100px; margin: auto; border-collapse: separate; border-spacing: 0 4px; }
    th { color: #718096; font-size: 0.75rem; text-transform: uppercase; padding: 12px; letter-spacing: 1px; }
    td { background: rgba(26, 32, 44, 0.4); padding: 12px; }

    .monster-cell { font-size: 1.1rem; font-weight: 600; border-radius: 8px 0 0 8px; }
    .sub-row-player { font-size: 0.75rem; color: #4a5568; text-transform: uppercase; font-weight: 800; }
    
    /* 5. PLAYER COLORS & TIMES */
    .time-cell { text-align: center; border-left: 1px solid rgba(255,255,255,0.03); font-family: 'Consolas', monospace; }
    .time-link { 
      text-decoration: none; 
      cursor: pointer; 
      font-weight: bold; 
      padding: 2px 6px; 
      border-radius: 4px; 
      transition: 0.2s;
    }
    .time-link:hover { background: rgba(255,255,255,0.1); }
    
    .jeremy-time { color: #4ea1ff; text-shadow: 0 0 8px rgba(78, 161, 255, 0.3); }
    .matt-time { color: #ffb347; text-shadow: 0 0 8px rgba(255, 179, 71, 0.3); }
    
    .crown-icon { width: 20px; height: 20px; vertical-align: middle; margin-left: 6px; cursor: help; }
    .cell-flex { display: flex; align-items: center; gap: 12px; }

    /* 6. MODAL OVERLAY */
    #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
    #videoContainer { position: relative; width: 90%; max-width: 960px; aspect-ratio: 16/9; background: #000; border: 2px solid #2d3748; }
    #closeVideo { position: absolute; top: -35px; right: 0; color: #fff; cursor: pointer; font-size: 1rem; font-weight: bold; }

    #lastUpdated { text-align: center; margin: 40px auto; color: #4a5568; font-size: 0.75rem; letter-spacing: 1px; }
    .tier-row td { background: transparent; padding: 30px 10px 10px 0; color: #ed8936; font-weight: 900; font-size: 1.3rem; border-bottom: 1px solid #2d3748; }
  </style>
</head>
<body>

<h1>Hunter Leaderboard</h1>

<div class="filter-bar">
  <div id="btnTA" class="filter-btn active" onclick="setRunFilter('TA')">TA Rules</div>
  <div id="btnFreestyle" class="filter-btn" onclick="setRunFilter('Freestyle')">Freestyle</div>
</div>

<div class="scoreboard">
  <div class="score score-jeremy">Jeremy <span id="jeremyCount">0</span></div>
  <div class="score score-matt">Matt <span id="mattCount">0</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('weapons', this)">Weapon Times</div>
</div>

<div id="mainContent"></div>
<div id="lastUpdated">Connecting...</div>

<div id="videoOverlay" onclick="closeVideo()">
  <div id="videoContainer" onclick="event.stopPropagation()">
    <span id="closeVideo" onclick="closeVideo()">✕ CLOSE</span>
    <iframe id="videoFrame" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const GID_RUNS = '0';
const GID_MONSTERS = '73280311';
const GID_WEAPONS = '2020437619';

const GOLD_CROWN = "https://cdn-icons-png.flaticon.com/512/2583/2583344.png";
const SILVER_CROWN = "https://cdn-icons-png.flaticon.com/512/2583/2583350.png";

let allRunsRaw = [];
let monsterIcons = {};
let monsterTiers = {};
let weaponIcons = {};
let weaponOrder = []; 
let currentView = 'leaderboard';
let currentRunFilter = 'TA'; 

const clean = (s) => s ? s.toString().trim() : '';

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) { row.push(current); current = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) { row.push(current); rows.push(row); row = []; current = ''; }
    } else current += char;
  }
  if (current || row.length) { row.push(current); rows.push(row); }
  return rows;
}

function parseTime(val) {
  if (!val) return null;
  const s = val.toString().toLowerCase().trim();
  if (s.includes('dnf') || s === "" || s.includes('n/a')) return null;
  const m = s.match(/^(\d+):(\d+)(\.\d+)?/);
  if (!m) return null;
  const mins = parseInt(m[1]), secs = parseInt(m[2]), ms = m[3] ? parseFloat(m[3]) : 0;
  return mins >= 59 ? null : (mins * 60) + secs + ms;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60), s = Math.floor(secs % 60), ms = (secs % 1).toFixed(2).substring(1);
  return `${m}:${s.toString().padStart(2, '0')}${ms === '.00' ? '' : ms}`;
}

function getEmbedUrl(url) {
  if (!url) return "";
  let id = "";
  if (url.includes("v=")) id = url.split("v=")[1].split("&")[0];
  else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split("?")[0];
  return id ? `https://www.youtube.com/embed/${id}?autoplay=1` : url;
}

function openVideo(url) {
  const embed = getEmbedUrl(url);
  document.getElementById('videoFrame').src = embed;
  document.getElementById('videoOverlay').style.display = 'flex';
}

function closeVideo() {
  document.getElementById('videoOverlay').style.display = 'none';
  document.getElementById('videoFrame').src = '';
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = "Syncing Data...";
  try {
    const ts = Date.now();
    const [runsRes, mRes, wRes] = await Promise.all([
      fetch(`${SHEET_BASE}&gid=${GID_RUNS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_MONSTERS}&t=${ts}`).then(r => r.text()),
      fetch(`${SHEET_BASE}&gid=${GID_WEAPONS}&t=${ts}`).then(r => r.text())
    ]);

    const runRows = parseCSV(runsRes), mRows = parseCSV(mRes), wRows = parseCSV(wRes);

    monsterIcons = {}; monsterTiers = {};
    mRows.slice(1).forEach(r => {
      const name = clean(r[1]).toLowerCase();
      monsterTiers[name] = clean(r[0]); 
      monsterIcons[name] = clean(r[3]);
    });

    weaponIcons = {}; weaponOrder = [];
    wRows.slice(1).forEach(r => {
      const wName = clean(r[0]);
      weaponOrder.push(wName);
      weaponIcons[wName.toLowerCase()] = clean(r[2]);
    });

    const headers = runRows[0].map(h => h.toLowerCase().trim());
    const cP = headers.indexOf('player'), cR = headers.indexOf('run'), cM = headers.indexOf('monster'), 
          cW = headers.indexOf('weapon'), cT = headers.indexOf('duration'), cV = headers.indexOf('link');

    allRunsRaw = runRows.slice(1).map((r, idx) => ({
      player: clean(r[cP]),
      runType: clean(r[cR]),
      monster: clean(r[cM]),
      weapon: clean(r[cW]),
      timeSecs: parseTime(clean(r[cT])),
      link: clean(r[cV]),
      id: idx
    })).filter(r => r.timeSecs !== null);

    render();
    document.getElementById('lastUpdated').textContent = `LAST SYNC: ${new Date().toLocaleTimeString()}`;
  } catch (e) { console.error(e); }
}

function setRunFilter(type) {
  currentRunFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn${type}`).classList.add('active');
  render();
}

function switchTab(view, el) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  let filtered = allRunsRaw.filter(r => r.runType === currentRunFilter);
  
  const uniqueBestMap = new Map();
  filtered.forEach(r => {
    const key = `${r.player.toLowerCase()}|${r.monster.toLowerCase()}|${r.weapon.toLowerCase()}`;
    if (!uniqueBestMap.has(key) || r.timeSecs < uniqueBestMap.get(key).timeSecs) {
      uniqueBestMap.set(key, r);
    }
  });
  filtered = Array.from(uniqueBestMap.values());

  const monsterStats = {};
  filtered.forEach(r => {
    const m = r.monster.toLowerCase();
    if (!monsterStats[m]) monsterStats[m] = [];
    monsterStats[m].push(r);
  });
  
  for (let m in monsterStats) {
    monsterStats[m].sort((a, b) => a.timeSecs - b.timeSecs);
  }

  if (currentView === 'leaderboard') {
    renderLeaderboard(filtered, monsterStats);
  } else {
    renderWeaponTimes(filtered, monsterStats);
  }
}

function renderLeaderboard(filtered, monsterStats) {
  const bestOfEach = Object.values(monsterStats).map(list => list[0]);
  const grouped = {};
  bestOfEach.forEach(r => {
    const tier = monsterTiers[r.monster.toLowerCase()] || 'Other';
    if (!grouped[tier]) grouped[tier] = [];
    grouped[tier].push(r);
  });

  let jW = 0, mW = 0;
  bestOfEach.forEach(r => { 
    if (r.player.toLowerCase().includes('jeremy')) jW++; else mW++; 
  });
  document.getElementById('jeremyCount').textContent = jW;
  document.getElementById('mattCount').textContent = mW;

  let html = `<table><thead><tr><th>Monster</th><th>Player</th><th>Weapon</th><th style="text-align:right">Time</th></tr></thead><tbody>`;
  Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="4">${tier}</td></tr>`;
    grouped[tier].forEach(r => {
      const isJeremy = r.player.toLowerCase().includes('jeremy');
      const timeStr = formatTime(r.timeSecs);
      const isTempered = r.monster.toLowerCase().includes('tempered');
      const timeHtml = r.link ? `<span onclick="openVideo('${r.link}')" class="time-link ${isJeremy ? 'jeremy-time' : 'matt-time'}">${timeStr}</span>` : `<span class="${isJeremy ? 'jeremy-time' : 'matt-time'}">${timeStr}</span>`;
      
      html += `<tr>
        <td class="monster-cell"><div class="cell-flex">${monsterIcons[r.monster.toLowerCase()] ? `<img src="${monsterIcons[r.monster.toLowerCase()]}" class="icon ${isTempered ? 'tempered-glow' : ''}">` : ''}${r.monster}</div></td>
        <td class="player ${isJeremy ? 'jeremy' : 'matt'}">${r.player}</td>
        <td><div class="cell-flex">${weaponIcons[r.weapon.toLowerCase()] ? `<img src="${weaponIcons[r.weapon.toLowerCase()]}" class="icon" style="width:20px;height:20px">` : ''}${r.weapon}</div></td>
        <td style="text-align:right">${timeHtml}</td>
      </tr>`;
    });
  });
  document.getElementById('mainContent').innerHTML = html + '</tbody></table>';
}

function renderWeaponTimes(filtered, monsterStats) {
  const monsters = [...new Set(filtered.map(r => r.monster))];
  const groupedByTier = {};
  monsters.forEach(m => {
    const t = monsterTiers[m.toLowerCase()] || 'Other';
    if (!groupedByTier[t]) groupedByTier[t] = [];
    groupedByTier[t].push(m);
  });

  let html = `<table class="weapon-grid"><thead><tr><th>Monster</th><th></th>`;
  weaponOrder.forEach(w => {
    const icon = weaponIcons[w.toLowerCase()];
    html += `<th style="text-align:center">${icon ? `<img src="${icon}" title="${w}" style="width:24px;height:24px">` : w}</th>`;
  });
  html += `</tr></thead><tbody>`;

  const lookup = {};
  filtered.forEach(r => {
    const p = r.player.toLowerCase().includes('jeremy') ? 'jeremy' : 'matt';
    const mKey = r.monster.toLowerCase();
    const rank = monsterStats[mKey].indexOf(r);
    let crown = "";
    
    if(rank === 0) {
      crown = `<img src="${GOLD_CROWN}" class="crown-icon" title="Current Leader">`;
    } else {
      const goldTime = monsterStats[mKey][0].timeSecs;
      const delta = (r.timeSecs - goldTime).toFixed(2);
      crown = `<img src="${SILVER_CROWN}" class="crown-icon" title="+${delta}s behind Gold">`;
    }

    const timeStr = formatTime(r.timeSecs);
    const content = r.link ? `<span onclick="openVideo('${r.link}')" class="time-link ${p === 'jeremy' ? 'jeremy-time' : 'matt-time'}">${timeStr}</span>` : `<span class="${p === 'jeremy' ? 'jeremy-time' : 'matt-time'}">${timeStr}</span>`;

    lookup[`${p}|${mKey}|${r.weapon.toLowerCase()}`] = content + crown;
  });

  Object.keys(groupedByTier).sort((a, b) => b.localeCompare(a)).forEach(tier => {
    html += `<tr class="tier-row"><td colspan="${weaponOrder.length + 2}">${tier}</td></tr>`;
    groupedByTier[tier].forEach(m => {
      const mKey = m.toLowerCase();
      const isTempered = mKey.includes('tempered');
      ['jeremy', 'matt'].forEach(p => {
        html += `<tr>
          ${p === 'jeremy' ? `<td rowspan="2" class="monster-cell"><div class="cell-flex">${monsterIcons[mKey] ? `<img src="${monsterIcons[mKey]}" class="icon ${isTempered ? 'tempered-glow' : ''}">` : ''}${m}</div></td>` : ''}
          <td class="player ${p} sub-row-player">${p.charAt(0).toUpperCase() + p.slice(1)}</td>`;
        weaponOrder.forEach(w => {
          const cellData = lookup[`${p}|${mKey}|${w.toLowerCase()}`];
          html += `<td class="time-cell">${cellData || '-'}</td>`;
        });
        html += `</tr>`;
      });
    });
  });
  document.getElementById('mainContent').innerHTML = html + `</tbody></table>`;
}

loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
