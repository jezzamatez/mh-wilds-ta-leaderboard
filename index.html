<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Wilds — Time Attack Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0f14;
  --surface: #161a22;
  --surface2: #1e2330;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #e8a020;
  --accent2: #c06010;
  --jeremy: #3b82f6;
  --matt: #10b981;
  --text: #f0ede8;
  --muted: #7a8090;
  --danger: #e05050;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

.container { max-width: 1000px; margin: auto; padding: 20px; }

h1 {
  font-family: 'Rajdhani';
  text-align: center;
  color: var(--accent);
  margin-bottom: 20px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: var(--surface);
  text-align: center;
  cursor: pointer;
  border-radius: 8px;
}

.tab.active {
  background: var(--surface2);
  color: var(--accent);
}

.board-wrap {
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.monster-name {
  font-family: 'Rajdhani';
}

.player-pill {
  padding: 4px 10px;
  border-radius: 20px;
}

.pp-jeremy { color: var(--jeremy); }
.pp-matt { color: var(--matt); }

.sync-status {
  text-align: center;
  margin-top: 20px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>TA Leaderboard</h1>

<div class="stats-bar">
  <div class="stat-card">
    <div id="jeremyCount">0</div>
    <div>Jeremy</div>
  </div>
  <div class="stat-card">
    <div id="mattCount">0</div>
    <div>Matt</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('h2h', this)">H2H</div>
</div>

<div id="mainContent">Loading...</div>

<div class="sync-status" id="lastUpdated">Connecting...</div>

</div>

<script>
// --- CONFIG ---
const SHEET_ID = '1H6wf4FxwHntdQvsy5DSMXxaEpgLPeX7NQ7SQ51KaU04';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const GID_RUNS = '0';

const DNF_TIME = 59 * 60;

let allRuns = [];

// --- CSV PARSER ---
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      if (inQuotes && text[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (current || row.length) {
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      }
    } else {
      current += char;
    }
  }

  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }

  return rows;
}

// --- TIME HELPERS ---
function parseTime(val) {
  if (!val) return null;

  const s = val.toString().toLowerCase().trim();

  if (s.includes('dnf')) return null;

  const m = s.match(/^(\d+):(\d+)/);
  if (!m) return null;

  const minutes = parseInt(m[1]);
  const seconds = parseInt(m[2]);

  // 🔥 HARD FILTER: anything 59:00 or higher = DNF
  if (minutes >= 59) return null;

  return minutes * 60 + seconds;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// --- PAIR RUNS ---
function pairHunts(runs) {
  const paired = {};

  runs.forEach(run => {
    const key = `${run.variant}-${run.monster}`.toLowerCase();

    if (!paired[key]) {
      paired[key] = {
        monster: run.monster,
        variant: run.variant
      };
    }

    if (run.player.toLowerCase().includes('jeremy')) {
      paired[key].jeremy = run;
    }

    if (run.player.toLowerCase().includes('matt')) {
      paired[key].matt = run;
    }
  });

  return Object.values(paired);
}

// --- LOAD DATA ---
async function loadData() {
  const content = document.getElementById('mainContent');
  const status = document.getElementById('lastUpdated');

  status.textContent = "Syncing...";

  try {
    const res = await fetch(`${SHEET_BASE}&gid=${GID_RUNS}`);
    const text = await res.text();
    const rows = parseCSV(text);

    const headers = rows[0].map(h => h.trim().toLowerCase());
    const col = name => headers.indexOf(name);

    const colPlayer = col('player');
    const colMonster = col('monster');
    const colVariant = col('variant');
    const colTime = col('time') !== -1 ? col('time') : col('best time');

    allRuns = [];

    rows.slice(1).forEach(r => {
      if (!r[colPlayer]) return;

      const time = parseTime(r[colTime]);

      // 🔥 IGNORE DNF RUNS
      if (!time || time >= DNF_TIME) return;

      allRuns.push({
        player: r[colPlayer],
        monster: r[colMonster],
        variant: r[colVariant] || 'Base',
        bestTime: time
      });
    });

    window._hunts = pairHunts(allRuns);

    renderLeaderboard();

    status.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    console.error(e);
    content.innerHTML = "Failed to load data";
    status.textContent = "Sync failed";
  }
}

// --- RENDER ---
function renderLeaderboard() {
  let rows = [];

  window._hunts.forEach(h => {
    if (h.jeremy) rows.push({ ...h.jeremy, name: 'Jeremy' });
    if (h.matt) rows.push({ ...h.matt, name: 'Matt' });
  });

  rows.sort((a, b) => a.bestTime - b.bestTime);

  let html = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Monster</th>
          <th>Player</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
  `;

  rows.forEach((r, i) => {
    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${r.monster}</td>
        <td>${r.name}</td>
        <td>${formatTime(r.bestTime)}</td>
      </tr>
    `;
  });

  html += '</tbody></table>';

  document.getElementById('mainContent').innerHTML = html;
}

// --- INIT ---
loadData();
setInterval(loadData, 120000);
</script>

</body>
</html>
